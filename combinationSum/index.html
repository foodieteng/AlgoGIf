<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combination Sum — DFS Tree Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e14;--bg2:#0f1319;--surface:#151a23;--surface2:#1a2030;
    --border:#252d3a;--border-bright:#3a4560;
    --text:#c8d0dc;--text-dim:#6b7a90;--text-bright:#e8edf5;
    --accent:#59c2ff;--accent-dim:#1a3a55;
    --green:#7fd962;--green-dim:#1a3520;
    --orange:#ffb454;--orange-dim:#3a2a15;
    --red:#ff6b6b;--red-dim:#3a1a1a;
    --purple:#c792ea;--purple-dim:#2a1a3a;
    --yellow:#ffd580;--cyan:#95e6cb;--pink:#f07178;
    --radius:10px;--shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}
  .app{max-width:1200px;margin:0 auto;padding:36px 20px 80px;}

  header{text-align:center;margin-bottom:32px;}
  header .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  header h1{font-family:'Instrument Serif',serif;font-size:clamp(28px,5vw,44px);font-weight:400;color:var(--text-bright);line-height:1.2;margin-bottom:6px;}
  header h1 em{font-style:italic;color:var(--orange);}
  header .subtitle{font-size:13px;color:var(--text-dim);}

  .example-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .example-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:all 0.2s;}
  .example-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .example-btn.active{border-color:var(--green);color:var(--green);background:var(--green-dim);}
  .example-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;}

  .controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
  .btn.primary:hover{background:#7ad2ff;}
  .btn:disabled{opacity:0.3;cursor:not-allowed;}
  .btn:disabled:hover{border-color:var(--border);color:var(--text);background:var(--surface);}
  .speed-control{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .speed-control input[type=range]{width:80px;accent-color:var(--accent);}

  .step-counter{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:10px;}

  .narration{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;font-size:13.5px;line-height:1.7;min-height:56px;}
  .narration code{font-family:'JetBrains Mono',monospace;background:var(--surface2);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--orange);border:1px solid var(--border);}
  .narration .hl{color:var(--accent);font-weight:600;}
  .narration .grn{color:var(--green);font-weight:600;}
  .narration .org{color:var(--orange);font-weight:600;}
  .narration .pur{color:var(--purple);font-weight:600;}
  .narration .red{color:var(--red);font-weight:600;}
  .narration .ylw{color:var(--yellow);font-weight:600;}

  .main-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:20px;}
  @media(max-width:860px){.main-grid{grid-template-columns:1fr;}}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
  .panel-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .panel-title .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

  #treeCanvas{width:100%;border-radius:8px;display:block;}

  .results-list{display:flex;flex-direction:column;gap:6px;max-height:420px;overflow-y:auto;}
  .result-item{font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all 0.3s;display:flex;align-items:center;gap:8px;}
  .result-item .ri-idx{font-size:10px;color:var(--text-dim);min-width:18px;}
  .result-item.just-added{border-color:var(--green);background:var(--green-dim);color:var(--green);animation:pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes pop-in{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .results-list::-webkit-scrollbar{width:4px;}
  .results-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .path-chips{display:flex;gap:6px;flex-wrap:wrap;min-height:34px;align-items:center;}
  .path-chip{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 12px;border-radius:6px;animation:pop-in 0.3s ease;}
  .path-empty{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}

  /* Target meter */
  .target-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .target-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .target-bar-wrap{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;min-width:80px;}
  .target-bar-fill{height:100%;border-radius:5px;transition:width 0.4s ease,background 0.3s;}
  .target-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}

  .code-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;overflow-x:auto;max-height:420px;overflow-y:auto;box-shadow:var(--shadow);}
  .code-line{padding:1px 8px;border-radius:4px;transition:background 0.3s;white-space:pre;}
  .code-line.active{background:rgba(89,194,255,0.08);border-left:2px solid var(--accent);margin-left:-2px;}
  .code-line .kw{color:var(--pink);} .code-line .type{color:var(--accent);}
  .code-line .fn{color:var(--purple);} .code-line .cmt{color:#546e7a;font-style:italic;}
  .code-line .num{color:var(--orange);} .code-line .var{color:var(--yellow);}
  .code-panel::-webkit-scrollbar{width:4px;}
  .code-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="eyebrow">DFS Tree Visualizer</div>
  <h1>Combination <em>Sum</em></h1>
  <div class="subtitle">LeetCode 39 · Backtracking · reuse allowed · O(n^(t/m))</div>
</header>

<div class="example-bar">
  <span class="example-label">EXAMPLE:</span>
  <button class="example-btn active" onclick="selectExample(0)">[2,3,6,7] t=7</button>
  <button class="example-btn"        onclick="selectExample(1)">[2,3,5]   t=8</button>
  <button class="example-btn"        onclick="selectExample(2)">[2,4]     t=6</button>
  <button class="example-btn"        onclick="selectExample(3)">[1,2,3]   t=4</button>
</div>

<div class="controls">
  <button class="btn" id="btnReset" onclick="if(gViz)gViz.reset()">↻ Reset</button>
  <button class="btn" id="btnPrev"  onclick="if(gViz)gViz.prev()">← Prev</button>
  <button class="btn primary" id="btnPlay" onclick="if(gViz)gViz.togglePlay()">▶ Play</button>
  <button class="btn" id="btnNext"  onclick="if(gViz)gViz.next()">Next →</button>
  <div class="speed-control">
    <span>Speed</span>
    <input type="range" id="speedSlider" min="300" max="2800" value="1500" oninput="if(gViz)gViz.setSpeed(3100-this.value)">
  </div>
</div>

<div class="step-counter" id="stepCounter">Step 0 / 0</div>
<div class="narration" id="narration">Press Play or Next to start.</div>

<div class="main-grid">
  <div class="panel">
    <div class="panel-title"><span class="dot" style="background:var(--accent)"></span>DFS Recursion Tree</div>
    <canvas id="treeCanvas"></canvas>
  </div>
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div class="panel">
      <div class="panel-title"><span class="dot" style="background:var(--orange)"></span>Current Path &amp; Remaining</div>
      <div class="target-row" id="targetRow"></div>
      <div class="path-chips" id="pathChips"><span class="path-empty">[ ]</span></div>
    </div>
    <div class="panel" style="flex:1">
      <div class="panel-title"><span class="dot" style="background:var(--green)"></span>Results <span id="resultCount" style="color:var(--green);margin-left:4px">0</span></div>
      <div class="results-list" id="resultsList"></div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-title"><span class="dot" style="background:var(--purple)"></span>Code</div>
  <div class="code-panel" id="codePanel"></div>
</div>

</div>

<script>
var gViz = null;

var EXAMPLES = [
  { nums:[2,3,6,7], target:7 },
  { nums:[2,3,5],   target:8 },
  { nums:[2,4],     target:6 },
  { nums:[1,2,3],   target:4 },
];

var CODE_LINES = [
  `<span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt; <span class="fn">combinationSum</span>(<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">nums</span>, <span class="kw">int</span> <span class="var">target</span>) {`,
  `  <span class="fn">sort</span>(<span class="var">nums</span>.<span class="fn">begin</span>(), <span class="var">nums</span>.<span class="fn">end</span>());`,
  `  <span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt; <span class="var">ans</span>;`,
  `  <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt; <span class="var">path</span>;`,
  `  <span class="fn">helper</span>(<span class="var">ans</span>, <span class="var">nums</span>, <span class="var">path</span>, <span class="num">0</span>, <span class="var">target</span>);`,
  `  <span class="kw">return</span> <span class="var">ans</span>;`,
  `}`,
  ` `,
  `<span class="kw">void</span> <span class="fn">helper</span>(<span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt;&amp; <span class="var">ans</span>, <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">nums</span>,`,
  `           <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">path</span>, <span class="kw">int</span> <span class="var">start</span>, <span class="kw">int</span> <span class="var">target</span>) {`,
  `  <span class="kw">if</span> (<span class="var">target</span> == <span class="num">0</span>) {`,
  `    <span class="var">ans</span>.<span class="fn">push_back</span>(<span class="var">path</span>);  <span class="cmt">// ✓ found valid combo</span>`,
  `    <span class="kw">return</span>;`,
  `  }`,
  `  <span class="kw">for</span> (<span class="kw">int</span> <span class="var">i</span> = <span class="var">start</span>; <span class="var">i</span> &lt; <span class="var">nums</span>.<span class="fn">size</span>(); <span class="var">i</span>++) {`,
  `    <span class="kw">if</span> (<span class="var">nums</span>[<span class="var">i</span>] &gt; <span class="var">target</span>) <span class="kw">return</span>;  <span class="cmt">// prune: sorted array</span>`,
  `    <span class="var">path</span>.<span class="fn">push_back</span>(<span class="var">nums</span>[<span class="var">i</span>]);`,
  `    <span class="fn">helper</span>(<span class="var">ans</span>, <span class="var">nums</span>, <span class="var">path</span>, <span class="var">i</span>, <span class="var">target</span> - <span class="var">nums</span>[<span class="var">i</span>]);  <span class="cmt">// i not i+1: reuse allowed</span>`,
  `    <span class="var">path</span>.<span class="fn">pop_back</span>();`,
  `  }`,
  `}`,
];

var VAL_COLORS = ['#59c2ff','#ffb454','#7fd962','#c792ea','#f07178','#95e6cb','#ffd580'];

// ── Build all steps by simulating DFS ──
function buildSteps(nums, target) {
  var sorted = nums.slice().sort(function(a,b){return a-b;});
  var steps = [];
  var ans = [];
  var nodes = [];
  var nodeId = 0;

  function dfs(path, start, rem, parentId) {
    var id = nodeId++;
    nodes.push({
      id: id, parentId: parentId,
      label: path.length ? path[path.length-1] : 'root',
      path: path.slice(), rem: rem,
      depth: path.length, state: 'normal'
    });

    // check target==0
    if (rem === 0) {
      ans.push(path.slice());
      nodes[id].state = 'found';
      steps.push({
        type:'found', nodeId:id, path:path.slice(), rem:rem,
        collected: ans.slice(),
        codeLine:11,
        narration:`<span class="grn">✓ Found!</span> path = <code>[${path.join(', ')}]</code>, target reached = <code>0</code>. Push to ans!`
      });
      return;
    }

    // announce this node
    steps.push({
      type:'enter', nodeId:id, path:path.slice(), rem:rem,
      collected: ans.slice(),
      codeLine: path.length===0 ? 8 : 17,
      narration: path.length===0
        ? `<span class="hl">Start DFS</span>. nums = <code>[${sorted.join(', ')}]</code>, target = <code>${target}</code>.`
        : `Enter with path=<code>[${path.join(', ')}]</code>, remaining=<span class="org">${rem}</span>.`
    });

    for (var i = start; i < sorted.length; i++) {
      // prune
      if (sorted[i] > rem) {
        var pruneId = nodeId++;
        nodes.push({
          id:pruneId, parentId:id,
          label:sorted[i], path:path.concat(sorted[i]),
          rem:rem-sorted[i], depth:path.length+1, state:'pruned'
        });
        steps.push({
          type:'prune', nodeId:pruneId, path:path.slice(), rem:rem,
          collected:ans.slice(), codeLine:15,
          narration:`<span class="red">Prune!</span> <code>nums[${i}]=${sorted[i]} > remaining=${rem}</code>. Array is sorted → no need to continue. Return.`
        });
        break;
      }

      // push
      path.push(sorted[i]);
      var childId = nodeId; // will be assigned in recursive call
      steps.push({
        type:'push', nodeId:id, path:path.slice(), rem:rem-sorted[i],
        collected:ans.slice(), codeLine:16,
        narration:`<span class="org">Push</span> <code>${sorted[i]}</code> → path=<code>[${path.join(', ')}]</code>, remaining = <code>${rem} - ${sorted[i]} = ${rem-sorted[i]}</code>.`
      });

      dfs(path, i, rem - sorted[i], id);

      path.pop();
      steps.push({
        type:'pop', nodeId:id, path:path.slice(), rem:rem,
        collected:ans.slice(), codeLine:18,
        narration:`<span class="pur">Pop back</span> ${sorted[i]} → path=<code>[${path.length?path.join(', '):''}]</code>, remaining back to <code>${rem}</code>.`
      });
    }
  }

  dfs([], 0, target, -1);

  steps.push({
    type:'done', nodeId:-1, path:[], rem:0,
    collected:ans.slice(), codeLine:20,
    narration:`<span class="grn">Done!</span> Found <span class="grn">${ans.length}</span> combination${ans.length!==1?'s':''} that sum to <code>${target}</code>.`
  });

  return {steps:steps, nodes:nodes, sorted:sorted};
}

// ── Tree Layout ──
function layoutTree(nodes) {
  if (!nodes.length) return {};
  var children = {};
  nodes.forEach(function(n) {
    if (children[n.parentId] === undefined) children[n.parentId] = [];
    children[n.parentId].push(n.id);
  });

  var subW = {};
  function computeW(id) {
    var ch = children[id] || [];
    if (!ch.length) { subW[id]=1; return 1; }
    var w = 0;
    ch.forEach(function(c){ w += computeW(c); });
    subW[id] = Math.max(w,1);
    return subW[id];
  }
  var root = nodes.find(function(n){return n.parentId===-1;});
  if (!root) return {};
  computeW(root.id);

  var pos = {};
  function assign(id, left) {
    var ch = children[id] || [];
    var node = nodes.find(function(n){return n.id===id;});
    pos[id] = { x: left + subW[id]/2, y: node.depth };
    var cx = left;
    ch.forEach(function(c){ assign(c, cx); cx += subW[c]; });
  }
  assign(root.id, 0);
  return pos;
}

// ── Visualizer class ──
function Visualizer(nums, target) {
  var self = this;
  var built = buildSteps(nums, target);
  this.steps   = built.steps;
  this.nodes   = built.nodes;
  this.sorted  = built.sorted;
  this.target  = target;
  this.pos     = layoutTree(built.nodes);
  this.cur     = 0;
  this.playing = false;
  this.speed   = 1600;
  this.timer   = null;
  this.visible = new Set();

  this.render();
}

Visualizer.prototype.render = function() {
  var self = this;
  var s = this.steps[this.cur];

  // update visible
  if (s.nodeId >= 0) this.visible.add(s.nodeId);

  // Step counter
  document.getElementById('stepCounter').textContent =
    'Step ' + (this.cur+1) + ' / ' + this.steps.length;

  // Narration
  document.getElementById('narration').innerHTML = s.narration;

  // Target bar
  var pct = this.target > 0 ? Math.max(0, s.rem / this.target * 100) : 0;
  var barColor = s.rem === 0 ? 'var(--green)' : s.rem < 0 ? 'var(--red)' : 'var(--accent)';
  document.getElementById('targetRow').innerHTML =
    '<span class="target-label">remaining</span>' +
    '<div class="target-bar-wrap"><div class="target-bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>' +
    '<span class="target-val" style="color:'+barColor+'">' + s.rem + '</span>' +
    '<span class="target-label">/ ' + this.target + '</span>';

  // Path chips
  var pc = document.getElementById('pathChips');
  if (!s.path.length) {
    pc.innerHTML = '<span class="path-empty">[ ]</span>';
  } else {
    var vals = this.sorted;
    pc.innerHTML = s.path.map(function(v) {
      var vi = vals.indexOf(v) % VAL_COLORS.length;
      var c = VAL_COLORS[vi];
      return '<div class="path-chip" style="border:1px solid '+c+';background:'+c+'22;color:'+c+'">'+v+'</div>';
    }).join('');
  }

  // Results
  document.getElementById('resultCount').textContent = s.collected.length;
  var lastAdded = s.type === 'found';
  var rl = document.getElementById('resultsList');
  rl.innerHTML = s.collected.map(function(sub, idx) {
    var isJust = lastAdded && idx === s.collected.length - 1;
    return '<div class="result-item ' + (isJust?'just-added':'') + '">' +
      '<span class="ri-idx">'+idx+'</span>' +
      '<span>['+sub.join(', ')+']</span>' +
      '</div>';
  }).join('');
  if (lastAdded && rl.lastElementChild) {
    rl.lastElementChild.scrollIntoView({block:'nearest', behavior:'smooth'});
  }

  // Code
  document.getElementById('codePanel').innerHTML = CODE_LINES.map(function(l, i) {
    return '<div class="code-line '+(i===s.codeLine?'active':'')+'">'+l+'</div>';
  }).join('');
  var activeLine = document.querySelector('.code-line.active');
  if (activeLine) activeLine.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Buttons
  document.getElementById('btnPrev').disabled  = this.cur === 0;
  document.getElementById('btnNext').disabled  = this.cur === this.steps.length - 1;
  document.getElementById('btnReset').disabled = this.cur === 0;
  document.getElementById('btnPlay').textContent = this.playing ? '⏸ Pause' : '▶ Play';

  // Draw tree
  this.drawTree(s);
};

Visualizer.prototype.drawTree = function(s) {
  var self = this;
  var canvas = document.getElementById('treeCanvas');
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.parentElement.clientWidth - 36;
  if (W <= 0) return;

  var posVals = Object.values(this.pos);
  if (!posVals.length) return;
  var maxX = Math.max.apply(null, posVals.map(function(p){return p.x;}));
  var maxY = Math.max.apply(null, posVals.map(function(p){return p.y;}));

  var NODE_R = Math.min(20, Math.max(12, W / Math.max(maxX * 3, 1)));
  var X_STEP = Math.max(NODE_R*2+8, W / Math.max(maxX+1, 1));
  var H_STEP = Math.max(56, Math.min(80, W*0.65 / Math.max(maxY+1,1)));
  var H = (maxY+1)*H_STEP + NODE_R*2 + 24;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W+'px';
  canvas.style.height = H+'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,W,H);

  var nx = function(id){ return self.pos[id].x * X_STEP - X_STEP/2 + NODE_R; };
  var ny = function(id){ return self.pos[id].y * H_STEP + NODE_R + 12; };

  // edges
  this.nodes.forEach(function(node) {
    if (node.parentId < 0) return;
    if (!self.visible.has(node.id)) return;
    var px = nx(node.parentId), py = ny(node.parentId);
    var cx2 = nx(node.id),     cy2 = ny(node.id);
    ctx.beginPath();
    ctx.moveTo(px, py+NODE_R);
    ctx.lineTo(cx2, cy2-NODE_R);
    if (node.state==='pruned') {
      ctx.setLineDash([4,4]);
      ctx.strokeStyle='#ff6b6b44';
      ctx.lineWidth=1.5;
    } else if (node.id===s.nodeId) {
      ctx.setLineDash([]);
      ctx.strokeStyle='#59c2ff99';
      ctx.lineWidth=2;
    } else {
      ctx.setLineDash([]);
      ctx.strokeStyle='#252d3a';
      ctx.lineWidth=1.5;
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // nodes
  this.nodes.forEach(function(node) {
    if (!self.visible.has(node.id)) return;
    var x = nx(node.id), y = ny(node.id);
    var isActive = node.id === s.nodeId;
    var isPruned = node.state === 'pruned';
    var isFound  = node.state === 'found';

    // glow
    if (isActive && !isPruned) {
      ctx.beginPath();
      ctx.arc(x,y,NODE_R+7,0,Math.PI*2);
      var g = ctx.createRadialGradient(x,y,0,x,y,NODE_R+7);
      var glowColor = isFound ? 'rgba(127,217,98,0.25)' : 'rgba(89,194,255,0.2)';
      g.addColorStop(0,glowColor); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(x,y,NODE_R,0,Math.PI*2);

    if (isPruned) {
      ctx.fillStyle='#3a1a1a'; ctx.strokeStyle='#ff6b6b66';
    } else if (isFound && isActive) {
      ctx.fillStyle='#1a3520'; ctx.strokeStyle='#7fd962';
    } else if (isActive) {
      ctx.fillStyle='#1a3a55'; ctx.strokeStyle='#59c2ff';
    } else if (node.state==='found') {
      ctx.fillStyle='#1a3520'; ctx.strokeStyle='#7fd96266';
    } else if (node.depth===0) {
      ctx.fillStyle='#1a2030'; ctx.strokeStyle='#3a4560';
    } else {
      var vi = self.sorted.indexOf(node.label) % VAL_COLORS.length;
      var col = VAL_COLORS[vi];
      ctx.fillStyle=col+'18'; ctx.strokeStyle=col+'88';
    }
    ctx.lineWidth = isActive ? 2 : 1.5;
    ctx.fill(); ctx.stroke();

    // label text
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var fs = Math.max(10, NODE_R*0.72);
    ctx.font='bold '+fs+'px "JetBrains Mono",monospace';
    if (isPruned)       ctx.fillStyle='#ff6b6b88';
    else if (isFound && isActive) ctx.fillStyle='#7fd962';
    else if (isActive)  ctx.fillStyle='#59c2ff';
    else if (node.state==='found') ctx.fillStyle='#7fd96299';
    else if (node.depth===0) ctx.fillStyle='#6b7a90';
    else {
      var vi2 = self.sorted.indexOf(node.label) % VAL_COLORS.length;
      ctx.fillStyle=VAL_COLORS[vi2];
    }
    ctx.fillText(node.depth===0 ? '∅' : String(node.label), x, y);

    // remaining label below node
    if (isActive && node.depth>0) {
      var remVal = s.rem;
      ctx.font=(Math.max(8,NODE_R*0.48))+'px "JetBrains Mono",monospace';
      ctx.fillStyle= remVal===0 ? '#7fd96288' : '#59c2ff66';
      ctx.fillText('r='+remVal, x, y+NODE_R+9);
    }

    // ✕ for pruned
    if (isPruned && isActive) {
      ctx.font='bold '+(NODE_R*0.8)+'px sans-serif';
      ctx.fillStyle='#ff6b6b';
      ctx.fillText('✕', x, y);
    }

    // ✓ for found
    if (isFound) {
      ctx.font='bold '+(NODE_R*0.75)+'px sans-serif';
      ctx.fillStyle= isActive ? '#7fd962' : '#7fd96255';
      ctx.fillText('✓', x+NODE_R*0.6, y-NODE_R*0.6);
    }
  });
};

Visualizer.prototype.next = function() {
  if (this.cur < this.steps.length-1) { this.cur++; this.render(); }
  else this.pause();
};
Visualizer.prototype.prev = function() {
  if (this.cur > 0) {
    this.cur--;
    // rebuild visible
    this.visible = new Set();
    for (var k=0; k<=this.cur; k++) {
      if (this.steps[k].nodeId >= 0) this.visible.add(this.steps[k].nodeId);
    }
    this.render();
  }
};
Visualizer.prototype.reset = function() {
  this.pause(); this.cur=0; this.visible=new Set(); this.render();
};
Visualizer.prototype.togglePlay = function() {
  this.playing ? this.pause() : this.play();
};
Visualizer.prototype.play = function() {
  var self = this;
  this.playing=true; this.render();
  this.timer=setInterval(function(){self.next();}, this.speed);
};
Visualizer.prototype.pause = function() {
  this.playing=false; clearInterval(this.timer); this.render();
};
Visualizer.prototype.setSpeed = function(ms) {
  var self = this;
  this.speed=ms;
  if (this.playing) { clearInterval(this.timer); this.timer=setInterval(function(){self.next();},ms); }
};

function selectExample(idx) {
  document.querySelectorAll('.example-btn').forEach(function(b,i){
    b.classList.toggle('active', i===idx);
  });
  if (gViz) gViz.pause();
  var ex = EXAMPLES[idx];
  gViz = new Visualizer(ex.nums, ex.target);
}

window.addEventListener('resize', function() {
  if (gViz) gViz.drawTree(gViz.steps[gViz.cur]);
});

// init
gViz = new Visualizer(EXAMPLES[0].nums, EXAMPLES[0].target);
</script>
</body>
</html>
