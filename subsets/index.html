<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subsets — DFS Tree Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e14; --bg2:#0f1319; --surface:#151a23; --surface2:#1a2030;
    --border:#252d3a; --border-bright:#3a4560;
    --text:#c8d0dc; --text-dim:#6b7a90; --text-bright:#e8edf5;
    --accent:#59c2ff; --accent-dim:#1a3a55;
    --green:#7fd962; --green-dim:#1a3520;
    --orange:#ffb454; --orange-dim:#3a2a15;
    --red:#ff6b6b; --red-dim:#3a1a1a;
    --purple:#c792ea; --purple-dim:#2a1a3a;
    --yellow:#ffd580; --cyan:#95e6cb; --pink:#f07178;
    --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}
  .app{max-width:1200px;margin:0 auto;padding:36px 20px 80px;}

  header{text-align:center;margin-bottom:36px;}
  header .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  header h1{font-family:'Instrument Serif',serif;font-size:clamp(28px,5vw,44px);font-weight:400;color:var(--text-bright);line-height:1.2;margin-bottom:6px;}
  header h1 em{font-style:italic;color:var(--green);}
  header .subtitle{font-size:13px;color:var(--text-dim);}

  /* Example selector */
  .example-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .example-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:all 0.2s;}
  .example-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .example-btn.active{border-color:var(--green);color:var(--green);background:var(--green-dim);}
  .example-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;}

  /* Controls */
  .controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
  .btn.primary:hover{background:#7ad2ff;}
  .btn:disabled{opacity:0.3;cursor:not-allowed;}
  .btn:disabled:hover{border-color:var(--border);color:var(--text);background:var(--surface);}
  .speed-control{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .speed-control input[type=range]{width:80px;accent-color:var(--accent);}

  /* Step counter */
  .step-counter{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:10px;}

  /* Narration */
  .narration{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;font-size:13.5px;line-height:1.7;min-height:56px;transition:all 0.3s;}
  .narration code{font-family:'JetBrains Mono',monospace;background:var(--surface2);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--orange);border:1px solid var(--border);}
  .narration .hl{color:var(--accent);font-weight:600;}
  .narration .grn{color:var(--green);font-weight:600;}
  .narration .org{color:var(--orange);font-weight:600;}
  .narration .pur{color:var(--purple);font-weight:600;}
  .narration .red{color:var(--red);font-weight:600;}

  /* Main layout */
  .main-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;margin-bottom:20px;}
  @media(max-width:900px){.main-grid{grid-template-columns:1fr;}}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
  .panel-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .panel-title .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

  /* Tree canvas */
  #treeCanvas{width:100%;border-radius:8px;display:block;}

  /* Results panel */
  .results-list{display:flex;flex-direction:column;gap:6px;max-height:480px;overflow-y:auto;}
  .result-item{font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all 0.4s;display:flex;align-items:center;gap:8px;}
  .result-item .ri-idx{font-size:10px;color:var(--text-dim);min-width:22px;}
  .result-item.just-added{border-color:var(--green);background:var(--green-dim);color:var(--green);animation:pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  .result-item.skipped{border-color:var(--red);background:var(--red-dim);color:var(--red);}
  @keyframes pop-in{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .results-list::-webkit-scrollbar{width:4px;}
  .results-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* Path display */
  .path-chips{display:flex;gap:6px;flex-wrap:wrap;min-height:32px;align-items:center;}
  .path-chip{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 12px;border-radius:6px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);animation:pop-in 0.3s ease;}
  .path-empty{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}

  /* Skip badge */
  .skip-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--red);background:var(--red-dim);color:var(--red);margin-left:8px;}

  /* Code panel */
  .code-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;overflow-x:auto;margin-bottom:0;box-shadow:var(--shadow);}
  .code-line{padding:1px 8px;border-radius:4px;transition:background 0.3s;white-space:pre;}
  .code-line.active{background:rgba(89,194,255,0.08);border-left:2px solid var(--accent);margin-left:-2px;}
  .code-line .kw{color:var(--pink);} .code-line .type{color:var(--accent);}
  .code-line .fn{color:var(--purple);} .code-line .cmt{color:#546e7a;font-style:italic;}
  .code-line .num{color:var(--orange);} .code-line .var{color:var(--yellow);}
</style>
</head>
<body>
<div class="app" id="app">

<header>
  <div class="eyebrow">DFS Tree Visualizer</div>
  <h1>Subsets <em>I</em></h1>
  <div class="subtitle">LeetCode 78 · Backtracking · O(n · 2ⁿ)</div>
</header>

<!-- Example selector -->
<div class="example-bar">
  <span class="example-label">EXAMPLE:</span>
  <button class="example-btn active" onclick="selectExample(0)">[1,2,3]</button>
  <button class="example-btn" onclick="selectExample(1)">[1,2]</button>
  <button class="example-btn" onclick="selectExample(2)">[0,1,2]</button>
  <button class="example-btn" onclick="selectExample(3)">[1,2,3,4]</button>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn" id="btnReset" onclick="if(viz)viz.reset()">↻ Reset</button>
  <button class="btn" id="btnPrev"  onclick="if(viz)viz.prev()">← Prev</button>
  <button class="btn primary" id="btnPlay" onclick="if(viz)viz.togglePlay()">▶ Play</button>
  <button class="btn" id="btnNext"  onclick="if(viz)viz.next()">Next →</button>
  <div class="speed-control">
    <span>Speed</span>
    <input type="range" id="speedSlider" min="300" max="2800" value="1400" oninput="if(viz)viz.setSpeed(3100-this.value)">
  </div>
</div>

<div class="step-counter" id="stepCounter">Step 0 / 0</div>
<div class="narration" id="narration">Press Play or Next to start.</div>

<div class="main-grid">
  <!-- Tree -->
  <div class="panel">
    <div class="panel-title"><span class="dot" style="background:var(--accent)"></span>DFS Recursion Tree</div>
    <canvas id="treeCanvas"></canvas>
  </div>

  <!-- Right side -->
  <div style="display:flex;flex-direction:column;gap:16px;">
    <!-- Current path -->
    <div class="panel">
      <div class="panel-title"><span class="dot" style="background:var(--orange)"></span>Current Path</div>
      <div class="path-chips" id="pathChips"><span class="path-empty">[ ]</span></div>
    </div>
    <!-- Results -->
    <div class="panel" style="flex:1">
      <div class="panel-title"><span class="dot" style="background:var(--green)"></span>Collected Subsets <span id="resultCount" style="color:var(--green);margin-left:4px">0</span></div>
      <div class="results-list" id="resultsList"></div>
    </div>
  </div>
</div>

<!-- Code -->
<div class="panel">
  <div class="panel-title"><span class="dot" style="background:var(--purple)"></span>Code</div>
  <div class="code-panel" id="codePanel"></div>
</div>

</div>

<script>
const EXAMPLES = [
  [1,2,3],
  [1,2],
  [0,1,2],
  [1,2,3,4],
];

const CODE_LINES = [
  /* 0 */ `<span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt; <span class="fn">subsets</span>(<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">nums</span>) {`,
  /* 1 */ `  <span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt; <span class="var">ans</span>;`,
  /* 2 */ `  <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt; <span class="var">path</span>;`,
  /* 3 */ `  <span class="fn">sort</span>(<span class="var">nums</span>.<span class="fn">begin</span>(), <span class="var">nums</span>.<span class="fn">end</span>());`,
  /* 4 */ `  <span class="fn">dfs</span>(<span class="var">ans</span>, <span class="var">path</span>, <span class="num">0</span>, <span class="var">nums</span>);`,
  /* 5 */ `  <span class="kw">return</span> <span class="var">ans</span>;`,
  /* 6 */ `}`,
  /* 7 */ ` `,
  /* 8 */ `<span class="kw">void</span> <span class="fn">dfs</span>(<span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt;&amp; <span class="var">ans</span>, <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt; <span class="var">path</span>,`,
  /* 9 */ `        <span class="kw">int</span> <span class="var">start</span>, <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">nums</span>) {`,
  /*10 */ `  <span class="var">ans</span>.<span class="fn">push_back</span>(<span class="var">path</span>);  <span class="cmt">// always collect current path</span>`,
  /*11 */ ` `,
  /*12 */ `  <span class="kw">for</span> (<span class="kw">int</span> <span class="var">i</span> = <span class="var">start</span>; <span class="var">i</span> &lt; <span class="var">nums</span>.<span class="fn">size</span>(); <span class="var">i</span>++) {`,
  /*13 */ `    <span class="var">path</span>.<span class="fn">push_back</span>(<span class="var">nums</span>[<span class="var">i</span>]);`,
  /*14 */ `    <span class="fn">dfs</span>(<span class="var">ans</span>, <span class="var">path</span>, <span class="var">i</span>+<span class="num">1</span>, <span class="var">nums</span>);`,
  /*15 */ `    <span class="var">path</span>.<span class="fn">pop_back</span>();`,
  /*16 */ `  }`,
  /*17 */ `}`,
];

// ── Build steps by simulating DFS ──
function buildSteps(nums) {
  const sorted = [...nums].sort((a,b)=>a-b);
  const steps = [];
  const ans = [];
  const nodes = [];
  let nodeId = 0;

  function dfs(path, start, parentId) {
    const id = nodeId++;
    nodes.push({ id, parentId, label: path.length ? path[path.length-1] : 'root',
                 path: [...path], depth: path.length, skipped: false });

    // Step: collect
    const collected = [...path];
    ans.push(collected);
    steps.push({
      type: 'collect',
      nodeId: id,
      path: [...path],
      collected: [...ans],
      codeLine: 10,
      narration: path.length === 0
        ? `<span class="hl">Root call</span>: collect empty set <code>[]</code>.`
        : `Collect path <code>[${path.join(', ')}]</code> → added to ans. ✓`,
      justAdded: collected,
    });

    for (let i = start; i < sorted.length; i++) {
      path.push(sorted[i]);
      steps.push({
        type: 'push',
        nodeId: id,
        path: [...path],
        collected: [...ans],
        codeLine: 13,
        narration: `<span class="org">Push</span> <code>${sorted[i]}</code> → path = <code>[${path.join(', ')}]</code>. Recurse with start=${i+1}.`,
        pushed: sorted[i],
      });

      dfs(path, i+1, id);

      path.pop();
      steps.push({
        type: 'pop',
        nodeId: id,
        path: [...path],
        collected: [...ans],
        codeLine: 15,
        narration: `<span class="pur">Pop back</span> → path = <code>[${path.length?path.join(', '):''}]</code>. Continue loop.`,
      });
    }
  }

  dfs([], 0, -1);
  steps.push({
    type: 'done',
    nodeId: -1,
    path: [],
    collected: [...ans],
    codeLine: 17,
    narration: `<span class="grn">Done!</span> All subsets collected: <span class="grn">${ans.length}</span> subsets total.`,
  });

  return { steps, nodes, sorted };
}

// ── Tree Layout ──
function layoutTree(nodes) {
  // Assign x positions using leaf-count
  const children = {};
  nodes.forEach(n => {
    if (!children[n.parentId]) children[n.parentId] = [];
    children[n.parentId].push(n.id);
  });

  // Compute subtree width
  const subW = {};
  function computeW(id) {
    const ch = children[id] || [];
    if (!ch.length) { subW[id] = 1; return 1; }
    let w = ch.reduce((s, c) => s + computeW(c), 0);
    subW[id] = Math.max(w, 1);
    return subW[id];
  }
  const root = nodes.find(n => n.parentId === -1);
  if (!root) return {};
  computeW(root.id);

  const pos = {};
  function assign(id, left) {
    const ch = children[id] || [];
    pos[id] = { x: left + subW[id]/2, y: nodes.find(n=>n.id===id).depth };
    let cx = left;
    ch.forEach(c => { assign(c, cx); cx += subW[c]; });
  }
  assign(root.id, 0);
  return pos;
}

// ── Colors per value ──
const VAL_COLORS = ['#59c2ff','#7fd962','#ffb454','#c792ea','#f07178','#95e6cb'];

// ── Visualizer ──
class Visualizer {
  constructor(nums) {
    this.nums = nums;
    const { steps, nodes, sorted } = buildSteps(nums);
    this.steps = steps;
    this.nodes = nodes;
    this.sorted = sorted;
    this.pos = layoutTree(nodes);
    this.cur = 0;
    this.playing = false;
    this.speed = 1700;
    this.timer = null;
    this.visibleNodes = new Set();
    this.activeNode = -1;
    this.render();
  }

  render() {
    const s = this.steps[this.cur];

    // Update visible nodes
    if (s.nodeId >= 0) this.visibleNodes.add(s.nodeId);
    this.activeNode = s.nodeId;

    // Step counter
    document.getElementById('stepCounter').textContent =
      `Step ${this.cur+1} / ${this.steps.length}`;

    // Narration
    document.getElementById('narration').innerHTML = s.narration;

    // Path chips
    const pc = document.getElementById('pathChips');
    if (s.path.length === 0) {
      pc.innerHTML = `<span class="path-empty">[ ]</span>`;
    } else {
      pc.innerHTML = s.path.map((v,i) => {
        const ci = this.sorted.indexOf(v) % VAL_COLORS.length;
        return `<div class="path-chip" style="border-color:${VAL_COLORS[ci]};background:${VAL_COLORS[ci]}22;color:${VAL_COLORS[ci]}">${v}</div>`;
      }).join('');
    }

    // Results list
    const rl = document.getElementById('resultsList');
    document.getElementById('resultCount').textContent = s.collected.length;
    const lastIsJust = s.type === 'collect';
    rl.innerHTML = s.collected.map((sub, idx) => {
      const isJust = lastIsJust &&
        JSON.stringify(sub) === JSON.stringify(s.justAdded) &&
        idx === s.collected.length - 1;
      return `<div class="result-item ${isJust?'just-added':''}">
        <span class="ri-idx">${idx}</span>
        <span>[${sub.join(', ')}]${sub.length===0?' &nbsp;<span style="color:var(--text-dim);font-size:10px">∅</span>':''}</span>
      </div>`;
    }).join('');
    if (lastIsJust) rl.lastElementChild?.scrollIntoView({block:'nearest',behavior:'smooth'});

    // Code
    const cp = document.getElementById('codePanel');
    cp.innerHTML = CODE_LINES.map((l,i) =>
      `<div class="code-line ${i===s.codeLine?'active':''}">${l||'&nbsp;'}</div>`
    ).join('');

    // Buttons
    document.getElementById('btnPrev').disabled = this.cur===0;
    document.getElementById('btnNext').disabled = this.cur===this.steps.length-1;
    document.getElementById('btnReset').disabled = this.cur===0;
    document.getElementById('btnPlay').textContent = this.playing ? '⏸ Pause' : '▶ Play';

    // Draw tree
    this.drawTree(s);
  }

  drawTree(s) {
    const canvas = document.getElementById('treeCanvas');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.clientWidth - 36;

    // Compute tree bounds
    const posVals = Object.values(this.pos);
    if (!posVals.length) return;
    const maxX = Math.max(...posVals.map(p=>p.x));
    const maxY = Math.max(...posVals.map(p=>p.y));
    const NODE_R = Math.min(22, Math.max(14, W / (maxX * 3.2)));
    const H_STEP = Math.max(60, Math.min(80, (W*0.7) / (maxY+1)));
    const X_STEP = Math.max(28, W / (maxX + 1));
    const H = (maxY + 1) * H_STEP + NODE_R * 2 + 20;

    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    const nx = id => this.pos[id].x * X_STEP - X_STEP/2 + NODE_R;
    const ny = id => this.pos[id].y * H_STEP + NODE_R + 10;

    // Draw edges first
    this.nodes.forEach(node => {
      if (node.parentId < 0) return;
      if (!this.visibleNodes.has(node.id)) return;
      const px = nx(node.parentId), py = ny(node.parentId);
      const cx = nx(node.id),       cy = ny(node.id);

      ctx.beginPath();
      ctx.moveTo(px, py + NODE_R);
      ctx.lineTo(cx, cy - NODE_R);

      if (node.skipped) {
        ctx.setLineDash([4,4]);
        ctx.strokeStyle = '#ff6b6b44';
      } else if (node.id === this.activeNode) {
        ctx.setLineDash([]);
        ctx.strokeStyle = '#59c2ff88';
        ctx.lineWidth = 2;
      } else {
        ctx.setLineDash([]);
        ctx.strokeStyle = '#252d3a';
        ctx.lineWidth = 1.5;
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineWidth = 1.5;
    });

    // Draw nodes
    this.nodes.forEach(node => {
      if (!this.visibleNodes.has(node.id)) return;
      const x = nx(node.id), y = ny(node.id);
      const isActive = node.id === this.activeNode;
      const isSkip   = node.skipped;

      // Glow
      if (isActive && !isSkip) {
        ctx.beginPath();
        ctx.arc(x, y, NODE_R + 6, 0, Math.PI*2);
        const g = ctx.createRadialGradient(x,y,0,x,y,NODE_R+6);
        g.addColorStop(0, 'rgba(89,194,255,0.2)');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fill();
      }

      // Node circle
      ctx.beginPath();
      ctx.arc(x, y, NODE_R, 0, Math.PI*2);

      if (isSkip) {
        ctx.fillStyle = '#3a1a1a';
        ctx.strokeStyle = '#ff6b6b66';
      } else if (isActive) {
        ctx.fillStyle = '#1a3a55';
        ctx.strokeStyle = '#59c2ff';
      } else if (node.depth === 0) {
        ctx.fillStyle = '#1a2030';
        ctx.strokeStyle = '#3a4560';
      } else {
        // color by value
        const vals = [...new Set(this.sorted)];
        const vi = vals.indexOf(node.label) % VAL_COLORS.length;
        const col = VAL_COLORS[vi];
        ctx.fillStyle = col + '18';
        ctx.strokeStyle = col + '88';
      }
      ctx.lineWidth = isActive ? 2 : 1.5;
      ctx.fill(); ctx.stroke();

      // Label
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${Math.max(10,NODE_R*0.7)}px 'JetBrains Mono',monospace`;
      if (isSkip) ctx.fillStyle = '#ff6b6b88';
      else if (isActive) ctx.fillStyle = '#59c2ff';
      else if (node.depth === 0) ctx.fillStyle = '#6b7a90';
      else {
        const vals = [...new Set(this.sorted)];
        const vi = vals.indexOf(node.label) % VAL_COLORS.length;
        ctx.fillStyle = VAL_COLORS[vi];
      }
      ctx.fillText(node.depth===0 ? '∅' : String(node.label), x, y);

      // Path label below node (only for non-root non-skip)
      if (!isSkip && isActive && node.depth > 0) {
        ctx.font = `${Math.max(9, NODE_R*0.5)}px 'JetBrains Mono',monospace`;
        ctx.fillStyle = '#59c2ff88';
        const lbl = '[' + node.path.join(',') + ']';
        ctx.fillText(lbl, x, y + NODE_R + 9);
      }

      // X mark for skipped
      if (isSkip) {
        ctx.font = `bold ${NODE_R*0.6}px sans-serif`;
        ctx.fillStyle = '#ff6b6b';
        ctx.fillText('✕', x, y);
      }
    });
  }

  next()  { if(this.cur<this.steps.length-1){this.cur++;this.render();}else this.pause(); }
  prev()  { if(this.cur>0){this.cur--;this.rebuildVisible();this.render();} }
  reset() { this.pause();this.cur=0;this.visibleNodes=new Set();this.render(); }

  rebuildVisible() {
    this.visibleNodes = new Set();
    for (let k=0;k<=this.cur;k++) {
      if(this.steps[k].nodeId>=0) this.visibleNodes.add(this.steps[k].nodeId);
    }
  }

  togglePlay() { this.playing ? this.pause() : this.play(); }
  play()  { this.playing=true;this.render();this.timer=setInterval(()=>this.next(),this.speed); }
  pause() { this.playing=false;clearInterval(this.timer);this.render(); }
  setSpeed(ms){ this.speed=ms; if(this.playing){clearInterval(this.timer);this.timer=setInterval(()=>this.next(),this.speed);} }
}

var viz = null;
var curExIdx = 0;

function selectExample(idx) {
  curExIdx = idx;
  document.querySelectorAll('.example-btn').forEach((b,i) =>
    b.classList.toggle('active', i===idx));
  if (viz) viz.pause();
  viz = new Visualizer(EXAMPLES[idx]);
}

window.addEventListener('resize', () => {
  if (viz) viz.drawTree(viz.steps[viz.cur]);
});

// Init after DOM ready
viz = new Visualizer(EXAMPLES[0]);
</script>
