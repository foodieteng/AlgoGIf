<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permutations — DFS Tree Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e14;--bg2:#0f1319;--surface:#151a23;--surface2:#1a2030;
    --border:#252d3a;--border-bright:#3a4560;
    --text:#c8d0dc;--text-dim:#6b7a90;--text-bright:#e8edf5;
    --accent:#59c2ff;--accent-dim:#1a3a55;
    --green:#7fd962;--green-dim:#1a3520;
    --orange:#ffb454;--orange-dim:#3a2a15;
    --red:#ff6b6b;--red-dim:#3a1a1a;
    --purple:#c792ea;--purple-dim:#2a1a3a;
    --yellow:#ffd580;--cyan:#95e6cb;--pink:#f07178;
    --radius:10px;--shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}
  .app{max-width:1200px;margin:0 auto;padding:36px 20px 80px;}

  header{text-align:center;margin-bottom:32px;}
  header .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  header h1{font-family:'Instrument Serif',serif;font-size:clamp(28px,5vw,44px);font-weight:400;color:var(--text-bright);line-height:1.2;margin-bottom:6px;}
  header h1 em{font-style:italic;color:var(--purple);}
  header .subtitle{font-size:13px;color:var(--text-dim);}

  .example-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .example-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:all 0.2s;}
  .example-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .example-btn.active{border-color:var(--green);color:var(--green);background:var(--green-dim);}
  .example-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;}

  .controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
  .btn.primary:hover{background:#7ad2ff;}
  .btn:disabled{opacity:0.3;cursor:not-allowed;}
  .btn:disabled:hover{border-color:var(--border);color:var(--text);background:var(--surface);}
  .speed-control{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .speed-control input[type=range]{width:80px;accent-color:var(--accent);}

  .step-counter{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:10px;}

  .narration{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;font-size:13.5px;line-height:1.7;min-height:56px;}
  .narration code{font-family:'JetBrains Mono',monospace;background:var(--surface2);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--orange);border:1px solid var(--border);}
  .narration .hl {color:var(--accent);font-weight:600;}
  .narration .grn{color:var(--green);font-weight:600;}
  .narration .org{color:var(--orange);font-weight:600;}
  .narration .pur{color:var(--purple);font-weight:600;}
  .narration .red{color:var(--red);font-weight:600;}
  .narration .ylw{color:var(--yellow);font-weight:600;}

  .main-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:20px;}
  @media(max-width:860px){.main-grid{grid-template-columns:1fr;}}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
  .panel-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .panel-title .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

  #treeCanvas{width:100%;border-radius:8px;display:block;}

  /* used[] display */
  .used-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .used-chip{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all 0.3s;text-align:center;}
  .used-chip.used{border-color:var(--red);background:var(--red-dim);color:var(--red);}
  .used-chip .uc-val{font-size:13px;}
  .used-chip .uc-lbl{font-size:9px;opacity:0.7;}

  .path-chips{display:flex;gap:6px;flex-wrap:wrap;min-height:34px;align-items:center;}
  .path-chip{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 12px;border-radius:6px;animation:pop-in 0.3s ease;}
  .path-empty{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);}

  .results-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;}
  .result-item{font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);display:flex;align-items:center;gap:8px;}
  .result-item .ri-idx{font-size:10px;color:var(--text-dim);min-width:18px;}
  .result-item.just-added{border-color:var(--green);background:var(--green-dim);color:var(--green);animation:pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes pop-in{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .results-list::-webkit-scrollbar{width:4px;}
  .results-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* progress bar */
  .progress-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .progress-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);min-width:56px;}
  .progress-bar-wrap{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:4px;background:var(--purple);transition:width 0.4s ease;}
  .progress-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--purple);}

  .code-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;overflow-x:auto;max-height:320px;overflow-y:auto;box-shadow:var(--shadow);}
  .code-line{padding:1px 8px;border-radius:4px;transition:background 0.3s;white-space:pre;}
  .code-line.active{background:rgba(89,194,255,0.08);border-left:2px solid var(--accent);margin-left:-2px;}
  .code-line .kw  {color:var(--pink);}
  .code-line .type{color:var(--accent);}
  .code-line .fn  {color:var(--purple);}
  .code-line .cmt {color:#546e7a;font-style:italic;}
  .code-line .num {color:var(--orange);}
  .code-line .var {color:var(--yellow);}
  .code-panel::-webkit-scrollbar{width:4px;}
  .code-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="eyebrow">DFS Tree Visualizer</div>
  <h1><em>Permutations</em></h1>
  <div class="subtitle">LeetCode 46 · Backtracking with used[] · O(n · n!)</div>
</header>

<div class="example-bar">
  <span class="example-label">EXAMPLE:</span>
  <button class="example-btn active" onclick="selectExample(0)">[1,2,3]</button>
  <button class="example-btn"        onclick="selectExample(1)">[1,2]</button>
  <button class="example-btn"        onclick="selectExample(2)">[0,1,2]</button>
  <button class="example-btn"        onclick="selectExample(3)">[1,2,4]</button>
</div>

<div class="controls">
  <button class="btn" id="btnReset" onclick="if(gViz)gViz.reset()">↻ Reset</button>
  <button class="btn" id="btnPrev"  onclick="if(gViz)gViz.prev()">← Prev</button>
  <button class="btn primary" id="btnPlay" onclick="if(gViz)gViz.togglePlay()">▶ Play</button>
  <button class="btn" id="btnNext"  onclick="if(gViz)gViz.next()">Next →</button>
  <div class="speed-control">
    <span>Speed</span>
    <input type="range" id="speedSlider" min="300" max="2800" value="1500"
           oninput="if(gViz)gViz.setSpeed(3100-this.value)">
  </div>
</div>

<div class="step-counter" id="stepCounter">Step 0 / 0</div>
<div class="narration" id="narration">Press Play or Next to start.</div>

<div class="main-grid">
  <!-- Tree -->
  <div class="panel">
    <div class="panel-title">
      <span class="dot" style="background:var(--accent)"></span>DFS Recursion Tree
    </div>
    <canvas id="treeCanvas"></canvas>
  </div>

  <!-- Right panel -->
  <div style="display:flex;flex-direction:column;gap:16px;">
    <!-- State -->
    <div class="panel">
      <div class="panel-title">
        <span class="dot" style="background:var(--orange)"></span>Current State
      </div>
      <!-- depth progress -->
      <div class="progress-row">
        <span class="progress-label">depth</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="depthFill" style="width:0%"></div>
        </div>
        <span class="progress-val" id="depthVal">0/0</span>
      </div>
      <!-- used[] -->
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-bottom:6px;">USED[]</div>
      <div class="used-row" id="usedRow"></div>
      <!-- path -->
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:10px;margin-bottom:6px;">PATH</div>
      <div class="path-chips" id="pathChips"><span class="path-empty">[ ]</span></div>
    </div>

    <!-- Results -->
    <div class="panel" style="flex:1">
      <div class="panel-title">
        <span class="dot" style="background:var(--green)"></span>
        Permutations
        <span id="resultCount" style="color:var(--green);margin-left:4px">0</span>
        <span id="resultTotal" style="color:var(--text-dim);font-size:9px;margin-left:2px"></span>
      </div>
      <div class="results-list" id="resultsList"></div>
    </div>
  </div>
</div>

<!-- Code -->
<div class="panel">
  <div class="panel-title">
    <span class="dot" style="background:var(--purple)"></span>Code
  </div>
  <div class="code-panel" id="codePanel"></div>
</div>

</div><!-- end .app -->

<script>
// ─────────────────────────────────────────────
//  Global state
// ─────────────────────────────────────────────
var gViz = null;

var EXAMPLES = [
  [1,2,3],
  [1,2],
  [0,1,2],
  [1,2,4],
];

var VAL_COLORS = ['#59c2ff','#ffb454','#7fd962','#c792ea','#f07178','#95e6cb','#ffd580'];

// ─────────────────────────────────────────────
//  Code lines  (complete, both functions)
// ─────────────────────────────────────────────
var CODE_LINES = [
  /* 0 */ `<span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt; <span class="fn">permute</span>(<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">nums</span>) {`,
  /* 1 */ `  <span class="kw">int</span> <span class="var">n</span> = <span class="var">nums</span>.<span class="fn">size</span>();`,
  /* 2 */ `  <span class="kw">vector</span>&lt;<span class="kw">bool</span>&gt; <span class="var">used</span>(<span class="var">n</span>, <span class="kw">false</span>);`,
  /* 3 */ `  <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt; <span class="var">path</span>;`,
  /* 4 */ `  <span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt; <span class="var">ans</span>;`,
  /* 5 */ `  <span class="fn">dfs</span>(<span class="var">ans</span>, <span class="var">path</span>, <span class="var">used</span>, <span class="var">nums</span>);`,
  /* 6 */ `  <span class="kw">return</span> <span class="var">ans</span>;`,
  /* 7 */ `}`,
  /* 8 */ ` `,
  /* 9 */ `<span class="kw">void</span> <span class="fn">dfs</span>(<span class="kw">vector</span>&lt;<span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&gt;&amp; <span class="var">ans</span>, <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">path</span>,`,
  /*10 */ `        <span class="kw">vector</span>&lt;<span class="kw">bool</span>&gt;&amp; <span class="var">used</span>, <span class="kw">vector</span>&lt;<span class="kw">int</span>&gt;&amp; <span class="var">nums</span>) {`,
  /*11 */ `  <span class="kw">if</span> (<span class="var">path</span>.<span class="fn">size</span>() == <span class="var">nums</span>.<span class="fn">size</span>()) {`,
  /*12 */ `    <span class="var">ans</span>.<span class="fn">push_back</span>(<span class="var">path</span>);  <span class="cmt">// ✓ complete permutation</span>`,
  /*13 */ `    <span class="kw">return</span>;`,
  /*14 */ `  }`,
  /*15 */ `  <span class="kw">for</span> (<span class="kw">int</span> <span class="var">i</span> = <span class="num">0</span>; <span class="var">i</span> &lt; <span class="var">nums</span>.<span class="fn">size</span>(); <span class="var">i</span>++) {`,
  /*16 */ `    <span class="kw">if</span> (<span class="var">used</span>[<span class="var">i</span>]) <span class="kw">continue</span>;  <span class="cmt">// skip already used</span>`,
  /*17 */ `    <span class="var">used</span>[<span class="var">i</span>] = <span class="kw">true</span>;`,
  /*18 */ `    <span class="var">path</span>.<span class="fn">push_back</span>(<span class="var">nums</span>[<span class="var">i</span>]);`,
  /*19 */ `    <span class="fn">dfs</span>(<span class="var">ans</span>, <span class="var">path</span>, <span class="var">used</span>, <span class="var">nums</span>);`,
  /*20 */ `    <span class="var">path</span>.<span class="fn">pop_back</span>();`,
  /*21 */ `    <span class="var">used</span>[<span class="var">i</span>] = <span class="kw">false</span>;`,
  /*22 */ `  }`,
  /*23 */ `}`,
];

// ─────────────────────────────────────────────
//  Build all steps by simulating DFS
// ─────────────────────────────────────────────
function buildSteps(nums) {
  var n = nums.length;
  var steps = [];
  var ans   = [];
  var nodes = [];
  var nodeId = 0;

  // factorial helper
  function fact(x) { return x <= 1 ? 1 : x * fact(x-1); }
  var totalPerms = fact(n);

  function dfs(path, used, parentId) {
    var id = nodeId++;
    nodes.push({
      id: id,
      parentId: parentId,
      label: path.length ? path[path.length-1] : 'root',
      path: path.slice(),
      used: used.slice(),
      depth: path.length,
      state: 'normal'
    });

    // base case
    if (path.length === n) {
      ans.push(path.slice());
      nodes[id].state = 'found';
      steps.push({
        type:'found',
        nodeId: id,
        path: path.slice(),
        used: used.slice(),
        collected: ans.slice(),
        codeLine: 12,
        narration: '<span class="grn">✓ Complete!</span> path = <code>[' + path.join(', ') + ']</code> — length equals n. Push to ans!'
      });
      return;
    }

    // enter node
    steps.push({
      type: 'enter',
      nodeId: id,
      path: path.slice(),
      used: used.slice(),
      collected: ans.slice(),
      codeLine: path.length === 0 ? 5 : 19,
      narration: path.length === 0
        ? '<span class="hl">Start DFS</span>. nums = <code>[' + nums.join(', ') + ']</code>. used[] all false. path empty.'
        : 'Enter dfs with path=<code>[' + path.join(', ') + ']</code>. Remaining slots: <span class="org">' + (n - path.length) + '</span>.'
    });

    for (var i = 0; i < n; i++) {
      // skip used
      if (used[i]) {
        steps.push({
          type: 'skip',
          nodeId: id,
          path: path.slice(),
          used: used.slice(),
          collected: ans.slice(),
          codeLine: 16,
          skipIdx: i,
          narration: '<span class="red">Skip</span> <code>nums[' + i + ']=' + nums[i] + '</code> — already in path (used[' + i + ']=true).'
        });
        continue;
      }

      // mark used & push
      used[i] = true;
      path.push(nums[i]);
      steps.push({
        type: 'push',
        nodeId: id,
        path: path.slice(),
        used: used.slice(),
        collected: ans.slice(),
        codeLine: 17,
        pushIdx: i,
        narration: '<span class="org">Pick</span> <code>nums[' + i + ']=' + nums[i] + '</code> → used[' + i + ']=true, push → path=<code>[' + path.join(', ') + ']</code>.'
      });

      dfs(path, used, id);

      // restore
      path.pop();
      used[i] = false;
      steps.push({
        type: 'pop',
        nodeId: id,
        path: path.slice(),
        used: used.slice(),
        collected: ans.slice(),
        codeLine: 20,
        popIdx: i,
        narration: '<span class="pur">Backtrack</span>: pop <code>' + nums[i] + '</code>, used[' + i + ']=false → path=<code>[' + (path.length ? path.join(', ') : '') + ']</code>.'
      });
    }
  }

  var initUsed = new Array(n).fill(false);
  dfs([], initUsed, -1);

  steps.push({
    type: 'done',
    nodeId: -1,
    path: [],
    used: new Array(n).fill(false),
    collected: ans.slice(),
    codeLine: 23,
    narration: '<span class="grn">Done!</span> Found all <span class="grn">' + ans.length + '</span> permutations of <code>[' + nums.join(', ') + ']</code>. (n! = ' + totalPerms + ')'
  });

  return { steps: steps, nodes: nodes, totalPerms: totalPerms };
}

// ─────────────────────────────────────────────
//  Tree layout
// ─────────────────────────────────────────────
function layoutTree(nodes) {
  if (!nodes.length) return {};
  var children = {};
  nodes.forEach(function(nd) {
    if (!children[nd.parentId]) children[nd.parentId] = [];
    children[nd.parentId].push(nd.id);
  });

  var subW = {};
  function computeW(id) {
    var ch = children[id] || [];
    if (!ch.length) { subW[id] = 1; return 1; }
    var w = 0;
    ch.forEach(function(c) { w += computeW(c); });
    subW[id] = Math.max(w, 1);
    return subW[id];
  }

  var root = nodes.find(function(nd) { return nd.parentId === -1; });
  if (!root) return {};
  computeW(root.id);

  var pos = {};
  function assign(id, left) {
    var nd  = nodes.find(function(n) { return n.id === id; });
    var ch  = children[id] || [];
    pos[id] = { x: left + subW[id] / 2, y: nd.depth };
    var cx  = left;
    ch.forEach(function(c) { assign(c, cx); cx += subW[c]; });
  }
  assign(root.id, 0);
  return pos;
}

// ─────────────────────────────────────────────
//  Visualizer
// ─────────────────────────────────────────────
function Visualizer(nums) {
  this.nums  = nums;
  this.n     = nums.length;
  var built  = buildSteps(nums);
  this.steps = built.steps;
  this.nodes = built.nodes;
  this.total = built.totalPerms;
  this.pos   = layoutTree(this.nodes);
  this.cur   = 0;
  this.playing = false;
  this.speed   = 1600;
  this.timer   = null;
  this.visible = new Set();
  this.render();
}

Visualizer.prototype.render = function() {
  var self = this;
  var s    = this.steps[this.cur];
  var nums = this.nums;

  // update visible nodes
  if (s.nodeId >= 0) this.visible.add(s.nodeId);

  // step counter
  document.getElementById('stepCounter').textContent =
    'Step ' + (this.cur + 1) + ' / ' + this.steps.length;

  // narration
  document.getElementById('narration').innerHTML = s.narration;

  // depth progress
  var pct = this.n > 0 ? Math.round(s.path.length / this.n * 100) : 0;
  document.getElementById('depthFill').style.width = pct + '%';
  document.getElementById('depthVal').textContent  = s.path.length + '/' + this.n;

  // used[] chips
  var usedHtml = '';
  for (var ui = 0; ui < nums.length; ui++) {
    var isUsed = s.used[ui];
    var vi = ui % VAL_COLORS.length;
    var col = isUsed ? '#ff6b6b' : VAL_COLORS[vi];
    usedHtml +=
      '<div class="used-chip ' + (isUsed ? 'used' : '') + '" ' +
      'style="' + (!isUsed ? 'border-color:' + col + '88;color:' + col + ';background:' + col + '11' : '') + '">' +
      '<div class="uc-val">' + nums[ui] + '</div>' +
      '<div class="uc-lbl">[' + ui + '] ' + (isUsed ? '✓' : '○') + '</div>' +
      '</div>';
  }
  document.getElementById('usedRow').innerHTML = usedHtml;

  // path chips
  var pc = document.getElementById('pathChips');
  if (!s.path.length) {
    pc.innerHTML = '<span class="path-empty">[ ]</span>';
  } else {
    pc.innerHTML = s.path.map(function(v, pi) {
      var vi  = nums.indexOf(v) % VAL_COLORS.length;
      var col = VAL_COLORS[vi];
      return '<div class="path-chip" style="border:1px solid ' + col + ';background:' + col + '22;color:' + col + '">' + v + '</div>';
    }).join('');
  }

  // results
  document.getElementById('resultCount').textContent = s.collected.length;
  document.getElementById('resultTotal').textContent = '/ ' + this.total;
  var isFound  = s.type === 'found';
  var rl = document.getElementById('resultsList');
  rl.innerHTML = s.collected.map(function(sub, idx) {
    var isJust = isFound && idx === s.collected.length - 1;
    return '<div class="result-item ' + (isJust ? 'just-added' : '') + '">' +
      '<span class="ri-idx">' + idx + '</span>' +
      '<span>[' + sub.join(', ') + ']</span>' +
      '</div>';
  }).join('');
  if (isFound && rl.lastElementChild) {
    rl.lastElementChild.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // code
  document.getElementById('codePanel').innerHTML = CODE_LINES.map(function(l, i) {
    return '<div class="code-line ' + (i === s.codeLine ? 'active' : '') + '">' + (l || '&nbsp;') + '</div>';
  }).join('');
  var activeLine = document.querySelector('.code-line.active');
  if (activeLine) activeLine.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // buttons
  document.getElementById('btnPrev').disabled  = this.cur === 0;
  document.getElementById('btnNext').disabled  = this.cur === this.steps.length - 1;
  document.getElementById('btnReset').disabled = this.cur === 0;
  document.getElementById('btnPlay').textContent = this.playing ? '⏸ Pause' : '▶ Play';

  // draw
  this.drawTree(s);
};

Visualizer.prototype.drawTree = function(s) {
  var self   = this;
  var canvas = document.getElementById('treeCanvas');
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var W   = canvas.parentElement.clientWidth - 36;
  if (W <= 0) return;

  var posVals = Object.values(this.pos);
  if (!posVals.length) return;
  var maxX = Math.max.apply(null, posVals.map(function(p) { return p.x; }));
  var maxY = Math.max.apply(null, posVals.map(function(p) { return p.y; }));

  var NODE_R = Math.min(20, Math.max(11, W / Math.max(maxX * 3.2, 1)));
  var X_STEP = Math.max(NODE_R * 2 + 6, W / Math.max(maxX + 1, 1));
  var H_STEP = Math.max(52, Math.min(78, W * 0.62 / Math.max(maxY + 1, 1)));
  var H      = (maxY + 1) * H_STEP + NODE_R * 2 + 24;

  canvas.width        = W * dpr;
  canvas.height       = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  var nx = function(id) { return self.pos[id].x * X_STEP - X_STEP / 2 + NODE_R; };
  var ny = function(id) { return self.pos[id].y * H_STEP + NODE_R + 12; };

  // ── edges ──
  this.nodes.forEach(function(node) {
    if (node.parentId < 0)            return;
    if (!self.visible.has(node.id))   return;
    if (!self.pos[node.parentId])     return;

    var px = nx(node.parentId), py = ny(node.parentId);
    var cx = nx(node.id),       cy = ny(node.id);

    ctx.beginPath();
    ctx.moveTo(px, py + NODE_R);
    ctx.lineTo(cx, cy - NODE_R);

    if (node.id === s.nodeId) {
      ctx.setLineDash([]);
      ctx.strokeStyle = '#59c2ffaa';
      ctx.lineWidth   = 2;
    } else {
      ctx.setLineDash([]);
      ctx.strokeStyle = '#252d3a';
      ctx.lineWidth   = 1.5;
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // ── nodes ──
  this.nodes.forEach(function(node) {
    if (!self.visible.has(node.id)) return;
    if (!self.pos[node.id])         return;

    var x        = nx(node.id);
    var y        = ny(node.id);
    var isActive = node.id === s.nodeId;
    var isFound  = node.state === 'found';

    // glow
    if (isActive) {
      ctx.beginPath();
      ctx.arc(x, y, NODE_R + 7, 0, Math.PI * 2);
      var gColor = isFound ? 'rgba(127,217,98,0.25)' : 'rgba(89,194,255,0.2)';
      var g = ctx.createRadialGradient(x, y, 0, x, y, NODE_R + 7);
      g.addColorStop(0, gColor);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fill();
    }

    // circle
    ctx.beginPath();
    ctx.arc(x, y, NODE_R, 0, Math.PI * 2);

    if (isFound && isActive) {
      ctx.fillStyle   = '#1a3520';
      ctx.strokeStyle = '#7fd962';
    } else if (isFound) {
      ctx.fillStyle   = '#1a3520';
      ctx.strokeStyle = '#7fd96266';
    } else if (isActive) {
      ctx.fillStyle   = '#1a3a55';
      ctx.strokeStyle = '#59c2ff';
    } else if (node.depth === 0) {
      ctx.fillStyle   = '#1a2030';
      ctx.strokeStyle = '#3a4560';
    } else {
      var vi  = self.nums.indexOf(node.label) % VAL_COLORS.length;
      var col = VAL_COLORS[vi];
      ctx.fillStyle   = col + '18';
      ctx.strokeStyle = col + '88';
    }
    ctx.lineWidth = isActive ? 2 : 1.5;
    ctx.fill();
    ctx.stroke();

    // label
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    var fs = Math.max(10, NODE_R * 0.72);
    ctx.font = 'bold ' + fs + 'px "JetBrains Mono",monospace';

    if (isFound && isActive) {
      ctx.fillStyle = '#7fd962';
    } else if (isFound) {
      ctx.fillStyle = '#7fd96299';
    } else if (isActive) {
      ctx.fillStyle = '#59c2ff';
    } else if (node.depth === 0) {
      ctx.fillStyle = '#6b7a90';
    } else {
      var vi2 = self.nums.indexOf(node.label) % VAL_COLORS.length;
      ctx.fillStyle = VAL_COLORS[vi2];
    }
    ctx.fillText(node.depth === 0 ? '∅' : String(node.label), x, y);

    // ✓ badge for found nodes
    if (isFound) {
      ctx.font      = 'bold ' + (NODE_R * 0.7) + 'px sans-serif';
      ctx.fillStyle = isActive ? '#7fd962' : '#7fd96255';
      ctx.fillText('✓', x + NODE_R * 0.65, y - NODE_R * 0.65);
    }

    // depth label (active only, non-root)
    if (isActive && node.depth > 0) {
      ctx.font      = Math.max(8, NODE_R * 0.46) + 'px "JetBrains Mono",monospace';
      ctx.fillStyle = '#59c2ff66';
      ctx.fillText('d=' + node.depth, x, y + NODE_R + 9);
    }
  });
};

Visualizer.prototype.next = function() {
  if (this.cur < this.steps.length - 1) { this.cur++; this.render(); }
  else this.pause();
};
Visualizer.prototype.prev = function() {
  if (this.cur > 0) {
    this.cur--;
    this.visible = new Set();
    for (var k = 0; k <= this.cur; k++) {
      if (this.steps[k].nodeId >= 0) this.visible.add(this.steps[k].nodeId);
    }
    this.render();
  }
};
Visualizer.prototype.reset = function() {
  this.pause();
  this.cur     = 0;
  this.visible = new Set();
  this.render();
};
Visualizer.prototype.togglePlay = function() {
  this.playing ? this.pause() : this.play();
};
Visualizer.prototype.play = function() {
  var self = this;
  this.playing = true;
  this.render();
  this.timer = setInterval(function() { self.next(); }, this.speed);
};
Visualizer.prototype.pause = function() {
  this.playing = false;
  clearInterval(this.timer);
  this.render();
};
Visualizer.prototype.setSpeed = function(ms) {
  var self = this;
  this.speed = ms;
  if (this.playing) {
    clearInterval(this.timer);
    this.timer = setInterval(function() { self.next(); }, ms);
  }
};

// ─────────────────────────────────────────────
//  Example selector & init
// ─────────────────────────────────────────────
function selectExample(idx) {
  document.querySelectorAll('.example-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === idx);
  });
  if (gViz) gViz.pause();
  gViz = new Visualizer(EXAMPLES[idx]);
}

window.addEventListener('resize', function() {
  if (gViz) gViz.drawTree(gViz.steps[gViz.cur]);
});

gViz = new Visualizer(EXAMPLES[0]);
</script>
