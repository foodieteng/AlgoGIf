<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russian Doll Envelopes — Algorithm Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg2: #0f1319;
    --surface: #151a23;
    --surface2: #1a2030;
    --border: #252d3a;
    --border-bright: #3a4560;
    --text: #c8d0dc;
    --text-dim: #6b7a90;
    --text-bright: #e8edf5;
    --accent: #59c2ff;
    --accent-dim: #1a3a55;
    --green: #7fd962;
    --green-dim: #1a3520;
    --green-glow: rgba(127,217,98,0.15);
    --orange: #ffb454;
    --orange-dim: #3a2a15;
    --red: #ff6b6b;
    --red-dim: #3a1a1a;
    --purple: #c792ea;
    --purple-dim: #2a1a3a;
    --yellow: #ffd580;
    --cyan: #95e6cb;
    --pink: #f07178;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Grain overlay ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── Layout ─── */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ─── Header ─── */
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 400;
    color: var(--text-bright);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  header h1 em { font-style: italic; color: var(--orange); }
  header .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 520px;
    margin: 0 auto;
  }

  /* ─── Controls ─── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { background: #7ad2ff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--border); color: var(--text); background: var(--surface); }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .speed-control input[type=range] {
    width: 80px;
    accent-color: var(--accent);
  }

  /* ─── Phase indicator ─── */
  .phase-bar {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 32px;
  }
  .phase-pip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    transition: all 0.4s;
  }
  .phase-pip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 16px rgba(89,194,255,0.15);
  }
  .phase-pip.done {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  /* ─── Panels ─── */
  .viz-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 700px) {
    .viz-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ─── Envelope visual ─── */
  .envelopes-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
    min-height: 100px;
  }
  .envelope {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .envelope .rect {
    border: 2px solid var(--border-bright);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .envelope .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
  }
  .envelope.highlight .rect {
    border-color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 20px rgba(89,194,255,0.2);
  }
  .envelope.sorted .rect {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .envelope.processing .rect {
    border-color: var(--orange);
    background: var(--orange-dim);
    box-shadow: 0 0 20px rgba(255,180,84,0.2);
  }
  .envelope.done .rect {
    border-color: var(--purple);
    background: var(--purple-dim);
  }

  /* ─── Tails array visual ─── */
  .tails-container {
    display: flex;
    gap: 6px;
    align-items: flex-end;
    min-height: 80px;
    padding: 10px 0;
  }
  .tail-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .tail-slot .bar {
    width: 48px;
    border-radius: 6px 6px 2px 2px;
    background: linear-gradient(180deg, var(--accent), #3a7abf);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--bg);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .tail-slot .bar.replacing {
    background: linear-gradient(180deg, var(--orange), #bf7a20);
    animation: pulse-orange 0.6s ease;
  }
  .tail-slot .bar.extending {
    background: linear-gradient(180deg, var(--green), #40a030);
    animation: pulse-green 0.6s ease;
  }
  .tail-slot .idx {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  @keyframes pulse-orange {
    0% { box-shadow: 0 0 0 0 rgba(255,180,84,0.5); }
    70% { box-shadow: 0 0 0 12px rgba(255,180,84,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,180,84,0); }
  }
  @keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(127,217,98,0.5); }
    70% { box-shadow: 0 0 0 12px rgba(127,217,98,0); }
    100% { box-shadow: 0 0 0 0 rgba(127,217,98,0); }
  }

  /* ─── Narration ─── */
  .narration {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.7;
    min-height: 60px;
    transition: all 0.3s;
  }
  .narration code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12.5px;
    color: var(--orange);
    border: 1px solid var(--border);
  }
  .narration .highlight-text { color: var(--accent); font-weight: 600; }
  .narration .green-text { color: var(--green); font-weight: 600; }
  .narration .orange-text { color: var(--orange); font-weight: 600; }

  /* ─── Code panel ─── */
  .code-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.9;
    overflow-x: auto;
    margin-bottom: 20px;
    max-height: 350px;
    overflow-y: auto;
    box-shadow: var(--shadow);
  }
  .code-line {
    padding: 1px 8px;
    border-radius: 4px;
    transition: background 0.3s;
    white-space: pre;
  }
  .code-line.active {
    background: rgba(89,194,255,0.08);
    border-left: 2px solid var(--accent);
    margin-left: -2px;
  }
  .code-line .kw { color: var(--pink); }
  .code-line .type { color: var(--accent); }
  .code-line .fn { color: var(--purple); }
  .code-line .cmt { color: #546e7a; font-style: italic; }
  .code-line .str { color: var(--green); }
  .code-line .num { color: var(--orange); }
  .code-line .var { color: var(--yellow); }
  .code-line .op { color: var(--pink); }

  /* ─── Result chain ─── */
  .chain-container {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 50px;
  }
  .chain-env {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 14px;
    border-radius: 8px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .chain-arrow {
    color: var(--text-dim);
    font-size: 16px;
  }
  @keyframes pop-in {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ─── Step counter ─── */
  .step-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 8px;
  }

  /* ─── Nesting visual ─── */
  .nesting-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 120px;
    padding: 20px;
  }
  .nest-env {
    border: 2px solid;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    position: relative;
    animation: nest-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes nest-in {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .nest-label {
    position: absolute;
    top: 2px;
    right: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
  }

  /* ─── Full width panel ─── */
  .full-panel {
    grid-column: 1 / -1;
  }

  /* ─── Smooth scrolling for code ─── */
  .code-panel::-webkit-scrollbar { width: 6px; }
  .code-panel::-webkit-scrollbar-track { background: transparent; }
  .code-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ═══════════════════════════════════════════════════
//  Russian Doll Envelopes — Algorithm Visualizer
//  Standalone vanilla JS — no build tools needed
// ═══════════════════════════════════════════════════

const EXAMPLE = [[5,4],[6,4],[6,7],[2,3],[1,1]];
const SORTED  = [[1,1],[2,3],[5,4],[6,7],[6,4]];
const HEIGHTS = [1,3,4,7,4];
const ANSWER  = 4;

const COLORS = ['#59c2ff','#7fd962','#ffb454','#c792ea','#f07178','#95e6cb','#ffd580'];

// All animation steps
function buildSteps() {
  const steps = [];

  // Phase 0: Intro
  steps.push({
    phase: 'input',
    narration: `We start with <code>${EXAMPLE.length}</code> envelopes: <code>${JSON.stringify(EXAMPLE)}</code>. Each envelope is <code>[width, height]</code>. Our goal: find the longest chain where each envelope <span class="highlight-text">strictly</span> fits inside the next.`,
    envStates: EXAMPLE.map((e,i)=>({w:e[0],h:e[1],state:'normal',idx:i})),
    tails: [],
    codeLine: 0,
    chainSoFar: [],
  });

  // Phase 1: Sort explanation
  steps.push({
    phase: 'sort',
    narration: `<span class="orange-text">Step 1 — Sort.</span> We sort by width <span class="highlight-text">ascending</span>. If widths are equal, sort heights <span class="orange-text">descending</span>. This trick ensures we never pick two same-width envelopes in our LIS.`,
    envStates: EXAMPLE.map((e,i)=>({w:e[0],h:e[1],state:'highlight',idx:i})),
    tails: [],
    codeLine: 5,
    chainSoFar: [],
  });

  // Phase 2: Show sorted result
  steps.push({
    phase: 'sort',
    narration: `After sorting: <code>${JSON.stringify(SORTED)}</code>. Notice <code>[6,7]</code> comes before <code>[6,4]</code> — same width, height descending. Now we extract just the heights: <code>[1, 3, 4, 7, 4]</code> and run LIS.`,
    envStates: SORTED.map((e,i)=>({w:e[0],h:e[1],state:'sorted',idx:i})),
    tails: [],
    codeLine: 12,
    chainSoFar: [],
  });

  // Phase 3–7: LIS steps
  const tailsState = [];
  const lisSteps = [
    { h:1, action:'extend', pos:0, msg:`Height = <code>1</code>. <code>tails</code> is empty, so we <span class="green-text">push 1</span>. This starts our subsequence.` },
    { h:3, action:'extend', pos:1, msg:`Height = <code>3</code>. <code>3 > 1</code> (last in tails), so we <span class="green-text">push 3</span>. LIS length grows to 2.` },
    { h:4, action:'extend', pos:2, msg:`Height = <code>4</code>. <code>4 > 3</code>, so we <span class="green-text">push 4</span>. LIS length grows to 3.` },
    { h:7, action:'extend', pos:3, msg:`Height = <code>7</code>. <code>7 > 4</code>, so we <span class="green-text">push 7</span>. LIS length grows to 4.` },
    { h:4, action:'replace', pos:2, msg:`Height = <code>4</code>. <code>lower_bound</code> finds index 2 (value <code>4 >= 4</code>), so we <span class="orange-text">replace tails[2]</span> with <code>4</code> (same value, no-op). Crucially, it does <strong>not</strong> extend the LIS — this is <code>lower_bound</code> enforcing <span class="highlight-text">strictly increasing</span>: equal values get replaced, not appended. Also, <code>[6,4]</code> can't nest with <code>[6,7]</code> (same width!) — the descending sort prevented that.` },
  ];

  lisSteps.forEach((ls, stepIdx) => {
    if (ls.action === 'extend') {
      tailsState.push({ val: ls.h, anim: 'extending' });
    } else {
      tailsState[ls.pos] = { val: ls.h, anim: 'replacing' };
    }
    const envStates = SORTED.map((e,i)=> ({
      w:e[0], h:e[1],
      state: i < stepIdx ? 'done' : i === stepIdx ? 'processing' : 'sorted',
      idx: i,
    }));
    steps.push({
      phase: 'lis',
      narration: ls.msg,
      envStates,
      tails: tailsState.map(t=>({...t})),
      codeLine: ls.action === 'extend' ? 22 : 24,
      currentH: ls.h,
      chainSoFar: [],
    });
    // reset anim after
    tailsState.forEach(t => t.anim = '');
  });

  // Phase 8: Result
  steps.push({
    phase: 'result',
    narration: `<span class="green-text">Done!</span> <code>tails.size() = 4</code>. The maximum nesting chain is <code>[1,1] → [2,3] → [5,4] → [6,7]</code>. Answer: <span class="green-text">4</span> envelopes.`,
    envStates: SORTED.map((e,i)=>({w:e[0],h:e[1],state: [0,1,2,3].includes(i)?'done':'normal',idx:i})),
    tails: tailsState.map(t=>({...t, anim:''})),
    codeLine: 27,
    chainSoFar: [[1,1],[2,3],[5,4],[6,7]],
  });

  return steps;
}

const CODE_LINES = [
  /* 0*/ '<span class="kw">class</span> <span class="type">Solution</span> {',
  /* 1*/ '<span class="kw">public</span>:',
  /* 2*/ '  <span class="type">int</span> <span class="fn">maxEnvelopes</span>(<span class="type">vector</span>&lt;<span class="type">vector</span>&lt;<span class="type">int</span>&gt;&gt;&amp; <span class="var">envelopes</span>) {',
  /* 3*/ '',
  /* 4*/ '    <span class="cmt">// Sort: width ASC, same width → height DESC</span>',
  /* 5*/ '    <span class="fn">sort</span>(<span class="var">envelopes</span>.<span class="fn">begin</span>(), <span class="var">envelopes</span>.<span class="fn">end</span>(),',
  /* 6*/ '      [](<span class="kw">const auto</span>&amp; <span class="var">a</span>, <span class="kw">const auto</span>&amp; <span class="var">b</span>) {',
  /* 7*/ '        <span class="kw">if</span> (<span class="var">a</span>[<span class="num">0</span>] <span class="op">==</span> <span class="var">b</span>[<span class="num">0</span>]) <span class="kw">return</span> <span class="var">a</span>[<span class="num">1</span>] <span class="op">></span> <span class="var">b</span>[<span class="num">1</span>];',
  /* 8*/ '        <span class="kw">return</span> <span class="var">a</span>[<span class="num">0</span>] <span class="op">&lt;</span> <span class="var">b</span>[<span class="num">0</span>];',
  /* 9*/ '      });',
  /*10*/ '',
  /*11*/ '    <span class="cmt">// O(N log N) LIS on heights</span>',
  /*12*/ '    <span class="type">vector</span>&lt;<span class="type">int</span>&gt; <span class="var">tails</span>;',
  /*13*/ '',
  /*14*/ '    <span class="kw">for</span> (<span class="kw">const auto</span>&amp; <span class="var">env</span> : <span class="var">envelopes</span>) {',
  /*15*/ '      <span class="type">int</span> <span class="var">h</span> = <span class="var">env</span>[<span class="num">1</span>];',
  /*16*/ '',
  /*17*/ '      <span class="cmt">// lower_bound: first tails[i] >= h → enforces strictly increasing</span>',
  /*18*/ '      <span class="kw">auto</span> <span class="var">it</span> = <span class="fn">lower_bound</span>(<span class="var">tails</span>.<span class="fn">begin</span>(), <span class="var">tails</span>.<span class="fn">end</span>(), <span class="var">h</span>);',
  /*19*/ '',
  /*20*/ '      <span class="kw">if</span> (<span class="var">it</span> <span class="op">==</span> <span class="var">tails</span>.<span class="fn">end</span>()) {',
  /*21*/ '        <span class="cmt">// Extend the LIS</span>',
  /*22*/ '        <span class="var">tails</span>.<span class="fn">push_back</span>(<span class="var">h</span>);',
  /*23*/ '      } <span class="kw">else</span> {',
  /*24*/ '        <span class="op">*</span><span class="var">it</span> = <span class="var">h</span>; <span class="cmt">// Replace to keep tails small</span>',
  /*25*/ '      }',
  /*26*/ '    }',
  /*27*/ '    <span class="kw">return</span> <span class="var">tails</span>.<span class="fn">size</span>();',
  /*28*/ '  }',
  /*29*/ '};',
];

// ─── Renderer ───
class Visualizer {
  constructor() {
    this.steps = buildSteps();
    this.current = 0;
    this.playing = false;
    this.speed = 1800;
    this.timer = null;
    this.render();
  }

  getPhaseStatus(phaseName) {
    const currentPhase = this.steps[this.current].phase;
    const phaseOrder = ['input','sort','lis','result'];
    const ci = phaseOrder.indexOf(currentPhase);
    const pi = phaseOrder.indexOf(phaseName);
    if (pi < ci) return 'done';
    if (pi === ci) return 'active';
    return '';
  }

  render() {
    const step = this.steps[this.current];
    const app = document.getElementById('app');
    app.innerHTML = `
      <header>
        <div class="eyebrow">Algorithm Visualizer</div>
        <h1>Russian Doll <em>Envelopes</em></h1>
        <div class="subtitle">LeetCode 354 · Sort + LIS with Binary Search · O(N log N)</div>
      </header>

      <div class="phase-bar">
        ${['input','sort','lis','result'].map(p =>
          `<div class="phase-pip ${this.getPhaseStatus(p)}">${
            {input:'INPUT',sort:'SORT',lis:'LIS',result:'RESULT'}[p]
          }</div>`
        ).join('')}
      </div>

      <div class="controls">
        <button class="btn" onclick="viz.reset()" ${this.current===0?'disabled':''}>↻ Reset</button>
        <button class="btn" onclick="viz.prev()" ${this.current===0?'disabled':''}>← Prev</button>
        <button class="btn primary" onclick="viz.togglePlay()">
          ${this.playing ? '⏸ Pause' : '▶ Play'}
        </button>
        <button class="btn" onclick="viz.next()" ${this.current===this.steps.length-1?'disabled':''}>Next →</button>
        <div class="speed-control">
          <span>Speed</span>
          <input type="range" min="500" max="3500" value="${4000 - this.speed}" oninput="viz.setSpeed(4000 - this.value)">
        </div>
      </div>

      <div class="step-counter">Step ${this.current + 1} / ${this.steps.length}</div>

      <div class="narration">${step.narration}</div>

      <div class="viz-grid">
        <div class="panel">
          <div class="panel-title"><span class="dot" style="background:var(--accent)"></span>Envelopes [w, h]</div>
          <div class="envelopes-row">
            ${step.envStates.map((e, i) => {
              const scale = 8;
              const w = Math.max(30, e.w * scale);
              const h = Math.max(24, e.h * scale);
              return `<div class="envelope ${e.state}" style="order:${i}">
                <div class="rect" style="width:${w}px;height:${h}px;border-color:${e.state==='processing'?'var(--orange)':''}">[${e.w},${e.h}]</div>
                <div class="label">#${i}</div>
              </div>`;
            }).join('')}
          </div>
        </div>

        <div class="panel">
          <div class="panel-title"><span class="dot" style="background:var(--green)"></span>Tails Array (LIS)</div>
          <div class="tails-container">
            ${step.tails.length === 0 ? '<span style="color:var(--text-dim);font-size:13px;font-family:JetBrains Mono,monospace;">[ empty ]</span>' :
              step.tails.map((t, i) => {
                const barH = Math.max(28, t.val * 10);
                return `<div class="tail-slot">
                  <div class="bar ${t.anim}" style="height:${barH}px">${t.val}</div>
                  <div class="idx">[${i}]</div>
                </div>`;
              }).join('')
            }
          </div>
          <div style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--text-dim);margin-top:8px;">
            length = <span style="color:var(--green);font-weight:700">${step.tails.length}</span>
          </div>
        </div>
      </div>

      ${step.chainSoFar.length > 0 ? `
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-title"><span class="dot" style="background:var(--purple)"></span>Maximum Nesting Chain</div>
        <div class="chain-container">
          ${step.chainSoFar.map((e,i) => `
            ${i>0?'<span class="chain-arrow">→</span>':''}
            <div class="chain-env">[${e[0]}, ${e[1]}]</div>
          `).join('')}
        </div>
        <div class="nesting-visual">
          ${this.renderNesting(step.chainSoFar)}
        </div>
      </div>` : ''}

      <div class="code-panel">
        ${CODE_LINES.map((line, i) =>
          `<div class="code-line ${i === step.codeLine ? 'active' : ''}">${line || '&nbsp;'}</div>`
        ).join('')}
      </div>
    `;

    // Scroll active code line into view
    const activeLine = document.querySelector('.code-line.active');
    if (activeLine) activeLine.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }

  renderNesting(chain) {
    if (chain.length === 0) return '';
    const colors = ['#f07178','#ffb454','#59c2ff','#c792ea'];
    // Build from outermost (largest) to innermost (smallest)
    // chain is already sorted small→large, so reverse for outer→inner
    const outer = [...chain].reverse();
    let html = '';
    let closeHtml = '';
    outer.forEach((e, i) => {
      const c = colors[outer.length - 1 - i];
      // Make the outermost big, each inner progressively smaller
      const baseW = 200;
      const baseH = 140;
      const shrink = i * 36;
      const w = baseW - shrink;
      const h = baseH - shrink;
      html += `<div class="nest-env" style="width:${w}px;height:${h}px;border-color:${c};background:${c}15;animation-delay:${i*0.1}s">
        <span class="nest-label" style="color:${c}">[${e[0]},${e[1]}]</span>`;
      closeHtml += '</div>';
    });
    return html + closeHtml;
  }

  next() {
    if (this.current < this.steps.length - 1) {
      this.current++;
      this.render();
    } else {
      this.pause();
    }
  }
  prev() {
    if (this.current > 0) {
      this.current--;
      this.render();
    }
  }
  reset() {
    this.pause();
    this.current = 0;
    this.render();
  }
  togglePlay() {
    this.playing ? this.pause() : this.play();
  }
  play() {
    this.playing = true;
    this.render();
    this.timer = setInterval(() => this.next(), this.speed);
  }
  pause() {
    this.playing = false;
    clearInterval(this.timer);
    this.render();
  }
  setSpeed(ms) {
    this.speed = ms;
    if (this.playing) {
      clearInterval(this.timer);
      this.timer = setInterval(() => this.next(), this.speed);
    }
  }
}

const viz = new Visualizer();
</script>
</body>
</html>
