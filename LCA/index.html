<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Lifting LCA — Algorithm Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg2: #0f1319;
    --surface: #151a23;
    --surface2: #1a2030;
    --border: #252d3a;
    --border-bright: #3a4560;
    --text: #c8d0dc;
    --text-dim: #6b7a90;
    --text-bright: #e8edf5;
    --accent: #59c2ff;
    --accent-dim: #1a3a55;
    --green: #7fd962;
    --green-dim: #1a3520;
    --orange: #ffb454;
    --orange-dim: #3a2a15;
    --red: #ff6b6b;
    --purple: #c792ea;
    --purple-dim: #2a1a3a;
    --yellow: #ffd580;
    --pink: #f07178;
    --pink-dim: #3a1a25;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .app { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

  header { text-align: center; margin-bottom: 48px; }
  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(32px, 5vw, 48px); font-weight: 400;
    color: var(--text-bright); line-height: 1.2; margin-bottom: 8px;
  }
  header h1 em { font-style: italic; color: var(--green); }
  header .subtitle { font-size: 14px; color: var(--text-dim); }

  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 36px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
    padding: 8px 20px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { background: #7ad2ff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .speed-control {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  }
  .speed-control input[type=range] { width: 80px; accent-color: var(--accent); }

  .phase-bar { display: flex; justify-content: center; gap: 4px; margin-bottom: 32px; }
  .phase-pip {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
    padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border);
    color: var(--text-dim); transition: all 0.4s;
  }
  .phase-pip.active {
    border-color: var(--accent); color: var(--accent); background: var(--accent-dim);
    box-shadow: 0 0 16px rgba(89,194,255,0.15);
  }
  .phase-pip.done { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  .viz-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
  }
  @media (max-width: 800px) { .viz-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
  }
  .panel-title {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .panel-title .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* ─── Tree Visualization ─── */
  .tree-container {
    position: relative; height: 260px; width: 100%;
    background: var(--bg2); border-radius: 8px; overflow: hidden;
  }
  .tree-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
  }
  .tree-node {
    position: absolute; width: 32px; height: 32px; margin-left: -16px; margin-top: -16px;
    background: var(--surface2); border: 2px solid var(--border-bright);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: bold;
    color: var(--text); z-index: 2; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .tree-node.is-u {
    border-color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 15px rgba(89,194,255,0.4);
  }
  .tree-node.is-v {
    border-color: var(--pink); background: var(--pink-dim); box-shadow: 0 0 15px rgba(240,113,120,0.4);
  }
  .tree-node.is-lca {
    border-color: var(--green); background: var(--green-dim); box-shadow: 0 0 20px rgba(127,217,98,0.5);
    transform: scale(1.1);
  }
  .node-label {
    position: absolute; bottom: -20px; width: 100px; left: -50px; text-align: center;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: normal; pointer-events: none;
  }
  .label-u { color: var(--accent); }
  .label-v { color: var(--pink); }

  /* ─── Variables & DP Table ─── */
  .vars-container {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .var-row { display: flex; gap: 16px; align-items: center; padding: 8px; background: var(--bg2); border-radius: 6px;}
  .var-box { display: flex; flex-direction: column; }
  .var-label { font-size: 10px; color: var(--text-dim); }
  .var-val { font-size: 14px; font-weight: bold; color: var(--text-bright); }
  
  .dp-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px;}
  .dp-table th { color: var(--text-dim); font-weight: normal; padding: 6px; text-align: center; border-bottom: 1px solid var(--border); }
  .dp-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--border-bright); transition: all 0.3s;}
  .dp-table .highlight-col { background: rgba(255, 180, 84, 0.15); border: 1px solid var(--orange); }
  
  .narration {
    background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--green);
    border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px;
    font-size: 15px; line-height: 1.7; min-height: 70px; transition: all 0.3s;
  }
  .narration code {
    font-family: 'JetBrains Mono', monospace; background: var(--surface2);
    padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--orange); border: 1px solid var(--border);
  }
  .narration .hl-u { color: var(--accent); font-weight: 600; }
  .narration .hl-v { color: var(--pink); font-weight: 600; }
  .narration .hl-ok { color: var(--green); font-weight: 600; }

  /* ─── Code Panel ─── */
  .code-panel {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px;
    line-height: 1.8; overflow-x: auto; margin-bottom: 20px; max-height: 400px;
    overflow-y: auto; box-shadow: var(--shadow); grid-column: 1 / -1;
  }
  .code-line { padding: 1px 8px; border-radius: 4px; transition: background 0.3s; white-space: pre; }
  .code-line.active { background: rgba(127,217,98,0.1); border-left: 3px solid var(--green); margin-left: -3px; }
  .code-line .kw { color: var(--pink); }
  .code-line .type { color: var(--accent); }
  .code-line .fn { color: var(--purple); }
  .code-line .cmt { color: #546e7a; font-style: italic; }
  .code-line .num { color: var(--orange); }
  .code-line .op { color: var(--yellow); }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ═══════════════════════════════════════════════════
//  Binary Lifting LCA — Algorithm Visualizer
// ═══════════════════════════════════════════════════

// Tree Definition
const nodes = [
  {id: 1, x: 50, y: 15, d: 0},
  {id: 2, x: 30, y: 35, d: 1}, {id: 3, x: 70, y: 35, d: 1},
  {id: 4, x: 30, y: 55, d: 2}, {id: 6, x: 70, y: 55, d: 2},
  {id: 5, x: 30, y: 75, d: 3}, {id: 7, x: 70, y: 75, d: 3},
  {id: 8, x: 30, y: 95, d: 4}
];
const edges = [[1,2], [1,3], [2,4], [4,5], [5,8], [3,6], [6,7]];

// Precomputed 'up' table (DP) [node][j]
const up = {
  1: [0, 0, 0], 2: [1, 0, 0], 3: [1, 0, 0],
  4: [2, 1, 0], 6: [3, 1, 0], 5: [4, 2, 0],
  7: [6, 3, 0], 8: [5, 4, 1]
};

function buildSteps() {
  const steps = [];
  
  // Phase 0: Input
  steps.push({
    phase: 'input', u: 8, v: 7, codeLine: 0,
    narration: `目標：尋找節點 <span class="hl-u">u=8</span> 和節點 <span class="hl-v">v=7</span> 的最近公共祖先(LCA)。首先確認兩者的深度。`,
    activeJ: null, diff: null
  });

  // Phase 1: Diff Calc
  steps.push({
    phase: 'align', u: 8, v: 7, codeLine: 2,
    narration: `深度 <code>depth[u]=4</code>，<code>depth[v]=3</code>。計算高度差：<code>diff = 4 - 3 = 1</code>。我們要把 u 拉到和 v 同樣的高度。`,
    activeJ: null, diff: 1
  });

  // Phase 1: Align bit 2
  steps.push({
    phase: 'align', u: 8, v: 7, codeLine: 4,
    narration: `將 diff (1) 轉為二進位：<code>001</code>。從最大步 $j=2$ 開始檢查：<code>diff >> 2 & 1 == 0</code>。不需要跳 4 步。`,
    activeJ: 2, diff: 1
  });

  // Phase 1: Align bit 1
  steps.push({
    phase: 'align', u: 8, v: 7, codeLine: 4,
    narration: `$j=1$ (跳 2 步)：<code>diff >> 1 & 1 == 0</code>。不需要跳。`,
    activeJ: 1, diff: 1
  });

  // Phase 1: Align bit 0
  steps.push({
    phase: 'align', u: 8, v: 7, codeLine: 5,
    narration: `$j=0$ (跳 1 步)：<code>diff >> 0 & 1 == 1</code>。條件成立！<span class="hl-u">u 往上跳 1 步</span>，<code>u = up[8][0] = 5</code>。`,
    activeJ: 0, diff: 1
  });

  // Phase 2: Same check
  steps.push({
    phase: 'jump', u: 5, v: 7, codeLine: 8,
    narration: `現在 <span class="hl-u">u=5</span> 與 <span class="hl-v">v=7</span> 高度相同了。檢查兩人是否已經相遇？<code>5 != 7</code>，繼續進行第二階段。`,
    activeJ: null, diff: 0
  });

  // Phase 2: Jump together j=2
  steps.push({
    phase: 'jump', u: 5, v: 7, codeLine: 10,
    narration: `兩人齊心往上跳。測試大步伐 $j=2$ (4步)：<code>up[5][2]=0</code>, <code>up[7][2]=0</code>。跳完祖先相同 (都是黑洞)，可能跳過頭了，所以<span style="color:var(--orange)">不跳</span>。`,
    activeJ: 2, diff: 0
  });

  // Phase 2: Jump together j=1
  steps.push({
    phase: 'jump', u: 5, v: 7, codeLine: 11,
    narration: `測試步伐 $j=1$ (2步)：<code>up[5][1]=2</code>, <code>up[7][1]=3</code>。<br><code>2 != 3</code>，祖先不同代表還沒超過 LCA。<span class="hl-ok">安全！兩人一起往上跳</span>。`,
    activeJ: 1, diff: 0
  });

  // Update after jump
  steps.push({
    phase: 'jump', u: 2, v: 3, codeLine: 12,
    narration: `<span class="hl-u">u 更新為 2</span>，<span class="hl-v">v 更新為 3</span>。`,
    activeJ: 1, diff: 0
  });

  // Phase 2: Jump together j=0
  steps.push({
    phase: 'jump', u: 2, v: 3, codeLine: 10,
    narration: `測試最後的步伐 $j=0$ (1步)：<code>up[2][0]=1</code>, <code>up[3][0]=1</code>。<br><code>1 == 1</code>，祖先相同，可能就是 LCA。<span style="color:var(--orange)">不跳</span>。`,
    activeJ: 0, diff: 0
  });

  // Phase 3: Result
  steps.push({
    phase: 'result', u: 2, v: 3, codeLine: 16,
    narration: `迴圈結束！此時 <span class="hl-u">u</span> 和 <span class="hl-v">v</span> 一定停在 LCA 的正下方。<br>最後回傳 <code>up[u][0]</code>，也就是 <code>up[2][0] = 1</code>。<br><span class="hl-ok">LCA 找到了：節點 1！</span>`,
    activeJ: null, diff: 0, isLca: true
  });

  return steps;
}

const CODE_LINES = [
  /* 0*/ '<span class="type">int</span> <span class="fn">get_lca</span>(<span class="type">int</span> u, <span class="type">int</span> v) {',
  /* 1*/ '  <span class="kw">if</span> (depth[u] <span class="op">&lt;</span> depth[v]) <span class="fn">swap</span>(u, v);',
  /* 2*/ '  <span class="type">int</span> diff <span class="op">=</span> depth[u] <span class="op">-</span> depth[v];',
  /* 3*/ '',
  /* 4*/ '  <span class="kw">for</span> (<span class="type">int</span> j <span class="op">=</span> <span class="num">0</span>; j <span class="op">&lt;</span> LOGN; j<span class="op">++</span>) {',
  /* 5*/ '    <span class="kw">if</span> ((diff <span class="op">&gt;&gt;</span> j) <span class="op">&amp;</span> <span class="num">1</span>) u <span class="op">=</span> up[u][j];',
  /* 6*/ '  }',
  /* 7*/ '',
  /* 8*/ '  <span class="kw">if</span> (u <span class="op">==</span> v) <span class="kw">return</span> u;',
  /* 9*/ '',
  /*10*/ '  <span class="kw">for</span> (<span class="type">int</span> j <span class="op">=</span> LOGN <span class="op">-</span> <span class="num">1</span>; j <span class="op">&gt;=</span> <span class="num">0</span>; j<span class="op">--</span>) {',
  /*11*/ '    <span class="kw">if</span> (up[u][j] <span class="op">!=</span> up[v][j]) {',
  /*12*/ '      u <span class="op">=</span> up[u][j];',
  /*13*/ '      v <span class="op">=</span> up[v][j];',
  /*14*/ '    }',
  /*15*/ '  }',
  /*16*/ '  <span class="kw">return</span> up[u][<span class="num">0</span>];',
  /*17*/ '}'
];

class Visualizer {
  constructor() {
    this.steps = buildSteps();
    this.current = 0;
    this.playing = false;
    this.speed = 2200;
    this.timer = null;
    this.render();
  }

  getPhaseStatus(phaseName) {
    const currentPhase = this.steps[this.current].phase;
    const phaseOrder = ['input','align','jump','result'];
    const ci = phaseOrder.indexOf(currentPhase);
    const pi = phaseOrder.indexOf(phaseName);
    if (pi < ci) return 'done';
    if (pi === ci) return 'active';
    return '';
  }

  render() {
    const step = this.steps[this.current];
    const app = document.getElementById('app');
    
    // Generate Tree SVG Edges
    const edgesHtml = edges.map(e => {
      const n1 = nodes.find(n => n.id === e[0]);
      const n2 = nodes.find(n => n.id === e[1]);
      return `<line x1="${n1.x}%" y1="${n1.y}%" x2="${n2.x}%" y2="${n2.y}%" stroke="var(--border-bright)" stroke-width="2"/>`;
    }).join('');

    // Generate Nodes
    const nodesHtml = nodes.map(n => {
      let cls = 'tree-node';
      let lbl = '';
      if (step.isLca && n.id === up[step.u][0]) { cls += ' is-lca'; lbl = '<div class="node-label" style="color:var(--green)">LCA!</div>'; }
      else {
        if (n.id === step.u) { cls += ' is-u'; lbl += '<div class="node-label label-u">u</div>'; }
        if (n.id === step.v) { cls += ' is-v'; lbl += `<div class="node-label label-v" style="${n.id===step.u?'bottom:-35px':''}">v</div>`; }
      }
      return `<div class="${cls}" style="left:${n.x}%; top:${n.y}%">${n.id}${lbl}</div>`;
    }).join('');

    app.innerHTML = `
      <header>
        <div class="eyebrow">Algorithm Visualizer</div>
        <h1>Binary Lifting <em>LCA</em></h1>
        <div class="subtitle">Lowest Common Ancestor · O(log N) Query Time</div>
      </header>

      <div class="phase-bar">
        ${['input','align','jump','result'].map(p =>
          `<div class="phase-pip ${this.getPhaseStatus(p)}">${
            {input:'1. 初始化',align:'2. 對齊深度',jump:'3. 同步跳躍',result:'4. 輸出結果'}[p]
          }</div>`
        ).join('')}
      </div>

      <div class="controls">
        <button class="btn" onclick="viz.reset()" ${this.current===0?'disabled':''}>↻ 重新</button>
        <button class="btn" onclick="viz.prev()" ${this.current===0?'disabled':''}>← 上一步</button>
        <button class="btn primary" onclick="viz.togglePlay()">
          ${this.playing ? '⏸ 暫停' : '▶ 播放'}
        </button>
        <button class="btn" onclick="viz.next()" ${this.current===this.steps.length-1?'disabled':''}>下一步 →</button>
        <div class="speed-control">
          <span>速度</span>
          <input type="range" min="800" max="4000" value="${4800 - this.speed}" oninput="viz.setSpeed(4800 - this.value)">
        </div>
      </div>

      <div class="narration">${step.narration}</div>

      <div class="viz-grid">
        <div class="panel">
          <div class="panel-title"><span class="dot" style="background:var(--green)"></span>Tree Hierarchy</div>
          <div class="tree-container">
            <svg class="tree-svg">${edgesHtml}</svg>
            ${nodesHtml}
          </div>
        </div>

        <div class="panel">
          <div class="panel-title"><span class="dot" style="background:var(--orange)"></span>Memory / DP Table</div>
          <div class="vars-container">
            <div class="var-row">
              <div class="var-box"><span class="var-label">curr_u</span><span class="var-val hl-u">${step.u}</span></div>
              <div class="var-box"><span class="var-label">curr_v</span><span class="var-val hl-v">${step.v}</span></div>
              <div class="var-box"><span class="var-label">diff</span><span class="var-val">${step.diff !== null ? step.diff : '-'}</span></div>
              <div class="var-box"><span class="var-label">j</span><span class="var-val" style="color:var(--yellow)">${step.activeJ !== null ? step.activeJ : '-'}</span></div>
            </div>
            
            <table class="dp-table">
              <tr>
                <th>Node</th>
                <th class="${step.activeJ===0?'highlight-col':''}">j=0 (1步)</th>
                <th class="${step.activeJ===1?'highlight-col':''}">j=1 (2步)</th>
                <th class="${step.activeJ===2?'highlight-col':''}">j=2 (4步)</th>
              </tr>
              <tr>
                <td style="color:var(--accent); font-weight:bold">u = ${step.u}</td>
                <td class="${step.activeJ===0?'highlight-col':''}">${up[step.u][0]}</td>
                <td class="${step.activeJ===1?'highlight-col':''}">${up[step.u][1]}</td>
                <td class="${step.activeJ===2?'highlight-col':''}">${up[step.u][2]}</td>
              </tr>
              <tr>
                <td style="color:var(--pink); font-weight:bold">v = ${step.v}</td>
                <td class="${step.activeJ===0?'highlight-col':''}">${up[step.v][0]}</td>
                <td class="${step.activeJ===1?'highlight-col':''}">${up[step.v][1]}</td>
                <td class="${step.activeJ===2?'highlight-col':''}">${up[step.v][2]}</td>
              </tr>
            </table>
          </div>
        </div>
        
        <div class="code-panel">
          ${CODE_LINES.map((line, i) =>
            `<div class="code-line ${i === step.codeLine ? 'active' : ''}">${line || '&nbsp;'}</div>`
          ).join('')}
        </div>
      </div>
    `;

    const activeLine = document.querySelector('.code-line.active');
    if (activeLine) activeLine.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }

  next() {
    if (this.current < this.steps.length - 1) { this.current++; this.render(); }
    else this.pause();
  }
  prev() {
    if (this.current > 0) { this.current--; this.render(); }
  }
  reset() {
    this.pause(); this.current = 0; this.render();
  }
  togglePlay() {
    this.playing ? this.pause() : this.play();
  }
  play() {
    this.playing = true; this.render();
    this.timer = setInterval(() => this.next(), this.speed);
  }
  pause() {
    this.playing = false; clearInterval(this.timer); this.render();
  }
  setSpeed(ms) {
    this.speed = ms;
    if (this.playing) {
      clearInterval(this.timer);
      this.timer = setInterval(() => this.next(), this.speed);
    }
  }
}

const viz = new Visualizer();
